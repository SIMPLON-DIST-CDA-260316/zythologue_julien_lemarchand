<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MERISE — Exploration arborescente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f1e7; --paper-2:#efe8d9; --card:#fffdf8; --ink:#221d16; --ink-soft:#4a4236;
  --muted:#8a7f6c; --line:#ddd2bd; --line-soft:#e8ded0;
  --accent:#a8432e; --accent-soft:#c9826f; --blue:#2c5160; --blue-soft:#5d8593;
  --code-bg:#f0ead9; --code-ink:#5a3a2f; --shadow:0 1px 2px rgba(40,30,15,.06),0 8px 24px rgba(40,30,15,.05);
  --note:#2c5160; --warn:#a8432e; --frbg:#f3ecdb; --frborder:#cdb98e;
}
[data-theme="dark"]{
  --paper:#15130e; --paper-2:#1b1813; --card:#211d16; --ink:#ece3d3; --ink-soft:#c3b8a3;
  --muted:#8d8170; --line:#352f25; --line-soft:#2a261d;
  --accent:#e07a5f; --accent-soft:#b1543e; --blue:#7fb0bf; --blue-soft:#4f7785;
  --code-bg:#1b1813; --code-ink:#d7a98e; --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.35);
  --note:#7fb0bf; --warn:#e07a5f; --frbg:#231f16; --frborder:#4a4029;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:"Hanken Grotesk",system-ui,sans-serif;font-size:16.5px;line-height:1.65;
  -webkit-font-smoothing:antialiased;transition:background .35s,color .35s;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ---- layout ---- */
.shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid var(--line);
  background:var(--paper-2);padding:0;
}
.brand{padding:22px 22px 14px;border-bottom:1px solid var(--line);background:var(--paper-2);position:sticky;top:0;z-index:5}
.brand h1{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:25px;margin:0;letter-spacing:-.01em;line-height:1.05}
.brand .sub{color:var(--muted);font-size:12.5px;margin-top:5px;letter-spacing:.04em;text-transform:uppercase}
.search-wrap{padding:14px 16px 6px;position:relative}
.search-wrap input{
  width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);
  color:var(--ink);font-family:inherit;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
.search-results{list-style:none;margin:6px 0 0;padding:0;max-height:340px;overflow:auto}
.search-results li{padding:0}
.search-results a{display:block;padding:8px 10px;border-radius:7px;color:var(--ink-soft);font-size:13.5px}
.search-results a:hover{background:var(--paper);text-decoration:none}
.search-results .crumb{display:block;font-size:11px;color:var(--muted);margin-top:1px}
.search-results mark{background:color-mix(in srgb,var(--accent) 30%,transparent);color:inherit;border-radius:2px}
.no-res{padding:10px;color:var(--muted);font-size:13px}

nav.tree{padding:8px 10px 60px}
nav.tree ul{list-style:none;margin:0;padding:0}
nav.tree li{margin:0}
nav.tree .row{display:flex;align-items:center;gap:4px;border-radius:7px;padding:1px 4px}
nav.tree .row:hover{background:var(--paper)}
nav.tree .tog{
  border:none;background:none;cursor:pointer;color:var(--muted);width:18px;height:24px;
  font-size:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:transform .18s;
}
nav.tree .tog.open{transform:rotate(90deg)}
nav.tree .tog.leaf{visibility:hidden}
nav.tree a.item{
  display:block;flex:1;padding:5px 8px;border-radius:6px;color:var(--ink-soft);font-size:13.8px;line-height:1.3;
}
nav.tree a.item .n{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;margin-right:6px}
nav.tree a.item:hover{text-decoration:none;color:var(--ink)}
nav.tree a.item.active{background:var(--accent);color:#fff;font-weight:600}
nav.tree a.item.active .n{color:rgba(255,255,255,.7)}
nav.tree .children{margin-left:14px;border-left:1px solid var(--line);padding-left:4px;display:none}
nav.tree .children.open{display:block}
nav.tree li.lvl1>.row>a.item{font-weight:600;color:var(--ink);font-size:14.5px;font-family:"Fraunces",serif}

/* ---- topbar ---- */
.main{min-width:0;display:flex;flex-direction:column}
.scrim{display:none}
.topbar{
  position:sticky;top:0;z-index:4;display:flex;align-items:center;gap:14px;
  padding:12px 34px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--paper) 88%,transparent);
  backdrop-filter:blur(8px);
}
.crumbs{flex:1;min-width:0;font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.crumbs a{color:var(--muted)}
.crumbs a:hover{color:var(--accent)}
.crumbs .sep{opacity:.5}
.crumbs .cur{color:var(--ink);font-weight:600}
.icon-btn{
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;
  width:38px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;
}
.icon-btn:hover{border-color:var(--accent-soft);color:var(--accent)}
.menu-btn{display:none}

/* ---- article ---- */
.article{max-width:820px;margin:0 auto;padding:38px 34px 90px;width:100%}
.kicker{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px}
.article h1{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:38px;line-height:1.08;letter-spacing:-.02em;margin:0 0 18px}
.article h2{font-family:"Fraunces",serif;font-weight:600;font-size:25px;margin:38px 0 12px;letter-spacing:-.01em;padding-top:10px;border-top:1px solid var(--line-soft)}
.article h3{font-family:"Fraunces",serif;font-weight:600;font-size:19px;margin:26px 0 8px}
.article p{margin:0 0 15px}
.article ul,.article ol{margin:0 0 16px;padding-left:22px}
.article li{margin:4px 0}
.lead{font-size:19px;line-height:1.55;color:var(--ink-soft);font-family:"Fraunces",serif;font-style:italic;margin-bottom:24px}
code{font-family:"JetBrains Mono",monospace;font-size:.86em;background:var(--code-bg);color:var(--code-ink);padding:1.5px 6px;border-radius:5px}
pre{background:var(--code-bg);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:16px 18px;overflow:auto;margin:0 0 18px}
pre code{background:none;padding:0;color:var(--ink);font-size:13.3px;line-height:1.6}
.tk{color:var(--accent)} .tc{color:var(--muted);font-style:italic}

table{width:100%;border-collapse:collapse;margin:0 0 20px;font-size:14.3px}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line)}
th{font-weight:600;color:var(--ink);border-bottom:2px solid var(--line);font-size:12.5px;letter-spacing:.03em;text-transform:uppercase}
td code{font-size:.92em}
tbody tr:hover{background:var(--paper-2)}

.callout{border-radius:11px;padding:15px 18px;margin:0 0 20px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)}
.callout .tag{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:block}
.callout p:last-child{margin-bottom:0}
.callout.note{border-left:3px solid var(--note)} .callout.note .tag{color:var(--note)}
.callout.warn{border-left:3px solid var(--warn)} .callout.warn .tag{color:var(--warn)}
.callout.fr{background:var(--frbg);border:1px solid var(--frborder);border-left:3px solid var(--accent)}
.callout.fr .tag{color:var(--accent)}

/* figures SVG (thématisées clair/sombre) */
figure.fig{margin:6px 0 24px;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
figure.fig svg{width:100%;height:auto;display:block;overflow:visible;font-family:"Hanken Grotesk",sans-serif}
figure.fig figcaption{margin-top:12px;font-size:13px;color:var(--muted);text-align:center;font-style:italic}
.s-txt{fill:var(--ink);font-size:13px}
.s-mut{fill:var(--muted);font-size:12px}
.s-bold{font-weight:700}
.s-mono{font-family:"JetBrains Mono",monospace}
.s-box{fill:var(--paper);stroke:var(--ink-soft);stroke-width:2}
.s-boxh{fill:var(--ink-soft)}
.s-boxht{fill:var(--paper);font-weight:700;font-size:13px}
.s-assoc{fill:var(--card);stroke:var(--accent);stroke-width:2}
.s-assoct{fill:var(--accent);font-weight:600;font-size:12.5px}
.s-line{stroke:var(--ink-soft);stroke-width:1.6;fill:none}
.s-line-2{stroke:var(--line);stroke-width:1.4;fill:none}
.s-card{fill:var(--blue);font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px}
.s-accent{fill:var(--accent)}
.s-accent-s{stroke:var(--accent);fill:none;stroke-width:2}
.s-blue{fill:var(--blue)}
.s-blue-s{stroke:var(--blue);fill:none;stroke-width:2}
.s-fill-card{fill:var(--card)}
.s-fill-paper2{fill:var(--paper-2)}
.s-dash{stroke-dasharray:5 4}

/* diagram primitives */
.diagram{display:flex;flex-wrap:wrap;gap:0;align-items:center;justify-content:center;margin:6px 0 22px;
  padding:22px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.ent{border:2px solid var(--ink-soft);border-radius:4px;min-width:150px;background:var(--paper);overflow:hidden}
.ent .h{background:var(--ink-soft);color:var(--paper);padding:6px 12px;font-weight:700;font-size:13.5px;letter-spacing:.04em;text-align:center}
.ent .b{padding:8px 12px;font-size:12.8px;font-family:"JetBrains Mono",monospace;line-height:1.7}
.ent .b .id{text-decoration:underline;font-weight:600}
.rel{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px}
.rel .line{height:2px;width:46px;background:var(--ink-soft)}
.rel .oval{border:2px solid var(--accent);background:var(--card);border-radius:40px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--accent);text-align:center}
.card-min{font-size:11.5px;color:var(--blue);font-family:"JetBrains Mono",monospace;font-weight:600}

.pager{display:flex;justify-content:space-between;gap:14px;margin-top:46px;border-top:1px solid var(--line);padding-top:20px}
.pager a{flex:1;border:1px solid var(--line);border-radius:11px;padding:13px 16px;color:var(--ink-soft);transition:.2s;background:var(--card)}
.pager a:hover{border-color:var(--accent-soft);text-decoration:none;color:var(--ink)}
.pager .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.pager .ttl{font-weight:600;font-size:14.5px;margin-top:2px;color:var(--accent)}
.pager .next{text-align:right}
.pager .empty{visibility:hidden}

.tag-pill{display:inline-block;background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);
  font-size:11.5px;padding:2px 9px;border-radius:20px;margin:0 5px 5px 0;font-family:"JetBrains Mono",monospace}

/* grille */
.grille{width:100%;border-collapse:separate;border-spacing:6px;margin-bottom:22px}
.grille th{background:none;border:none;text-align:center;color:var(--accent);text-transform:none;font-size:13px;letter-spacing:0}
.grille td{border:1px solid var(--line);border-radius:9px;background:var(--card);text-align:center;padding:14px 10px;vertical-align:middle}
.grille td .lv{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.grille td .mod{font-family:"Fraunces",serif;font-weight:600;font-size:18px;margin-top:3px}
.grille td.axis{background:var(--paper-2);font-weight:600;writing-mode:initial}
.grille td.empty{background:var(--paper-2);opacity:.4}

@media(max-width:920px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:300px;z-index:30;transform:translateX(-100%);transition:transform .28s}
  .sidebar.open{transform:none}
  .menu-btn{display:flex}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20}
  .scrim.show{display:block}
  .article{padding:26px 20px 80px}
  .article h1{font-size:30px}
  .topbar{padding:11px 18px}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>MERISE</h1>
      <div class="sub">Exploration arborescente</div>
    </div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Rechercher une notion…  ( / )" autocomplete="off" spellcheck="false">
      <ul class="search-results" id="searchResults"></ul>
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu">☰</button>
      <div class="crumbs" id="crumbs"></div>
      <button class="icon-btn" id="themeBtn" aria-label="Thème">◐</button>
    </div>
    <main class="article" id="article"></main>
  </div>
</div>

<script>
/* =========================================================================
   DONNÉES — structure NODES (data-driven). Chaque nœud :
   { id, parent, num, title, kw (mots-clés recherche), body (HTML) }
   ========================================================================= */
const NODES = [

/* ---------------------------------------------------------------- ACCUEIL */
{id:"home",parent:null,num:"",title:"Introduction",kw:"merise méthode introduction accueil systeme information conception",body:`
<div class="kicker">Document support de formation</div>
<h1>MERISE, de la pensée systémique au schéma relationnel</h1>
<p class="lead">Une méthode française de conception des systèmes d'information qui sépare rigoureusement ce que le système <em>mémorise</em> (les données) de ce qu'il <em>fait</em> (les traitements), et qui raisonne par paliers successifs d'abstraction.</p>
<p>MERISE n'est pas un langage ni un outil : c'est une <strong>démarche</strong> et un ensemble de <strong>formalismes</strong>. Née à la fin des années 1970, elle structure encore aujourd'hui l'enseignement de la conception de bases de données en France et reste un socle conceptuel précieux, y compris pour qui travaille avec UML, le SQL moderne ou le Domain-Driven Design.</p>

<h2>Comment lire ce document</h2>
<p>L'arborescence de gauche suit la logique même de la méthode. Trois grands ensembles :</p>
<ul>
<li><strong>Fondations</strong> — l'histoire, la philosophie, et les deux grandes grilles de lecture (le cycle d'abstraction, la grille données × traitements).</li>
<li><strong>Les trois axes</strong> — les <em>Données</em> (statique : MCD → MLD → MPD), les <em>Traitements</em> (dynamique : MCT → MOT → MOpT) et la <em>Communication</em> (les flux).</li>
<li><strong>Ponts modernes</strong> — ce que MERISE devient quand on le confronte à UML, au SQL/ORM d'aujourd'hui et au DDD.</li>
</ul>

<div class="callout fr">
<span class="tag">Le fil rouge</span>
<p>Un même cas concret — <strong>la gestion des prêts d'une médiathèque</strong> — traverse tout le document. À chaque niveau d'abstraction, on reprend ce cas pour voir comment une même réalité se transforme du concept jusqu'à la table SQL. Commencez par le lire : <a href="#fil-rouge">Le cas fil rouge</a>.</p>
</div>

<h2>La promesse centrale</h2>
<p>MERISE pose qu'on ne conçoit bien qu'en <strong>repoussant les décisions techniques le plus tard possible</strong>. On décrit d'abord le <em>quoi</em> (le sens métier, indépendant de toute machine), puis le <em>qui/où/quand</em> (l'organisation), et seulement à la fin le <em>comment</em> (la technique). Cette discipline de l'abstraction est l'apport le plus durable de la méthode — et celui qui résonne le plus avec les pratiques d'architecture contemporaines.</p>
`},

/* ------------------------------------------------------------- FIL ROUGE */
{id:"fil-rouge",parent:null,num:"",title:"Le cas fil rouge : la médiathèque",kw:"fil rouge médiathèque exemple cas pratique règles gestion adhérent ouvrage exemplaire emprunt",body:`
<div class="kicker">Cas pratique transverse</div>
<h1>La médiathèque municipale</h1>
<p class="lead">Un cas volontairement simple mais riche en relations, repris à chaque niveau d'abstraction pour rendre tangible la transformation conceptuel → logique → physique.</p>

<h2>Le contexte</h2>
<p>Une médiathèque veut informatiser la gestion de ses prêts. On recueille auprès des bibliothécaires les <strong>règles de gestion</strong> — la matière première de toute modélisation MERISE.</p>

<h2>Les règles de gestion</h2>
<table>
<thead><tr><th>N°</th><th>Règle</th></tr></thead>
<tbody>
<tr><td>RG1</td><td>Un <strong>ouvrage</strong> (l'œuvre : un titre, un ISBN) peut exister en plusieurs <strong>exemplaires</strong> physiques. Chaque exemplaire appartient à un seul ouvrage.</td></tr>
<tr><td>RG2</td><td>Un ouvrage est écrit par un ou plusieurs <strong>auteurs</strong> ; un auteur peut avoir écrit plusieurs ouvrages.</td></tr>
<tr><td>RG3</td><td>Chaque ouvrage est rangé dans une seule <strong>catégorie</strong> (Roman, Essai, BD…). Une catégorie regroupe plusieurs ouvrages.</td></tr>
<tr><td>RG4</td><td>Un <strong>adhérent</strong> peut emprunter plusieurs exemplaires. Un exemplaire donné n'est emprunté que par un seul adhérent à la fois, mais peut l'être par des adhérents différents au fil du temps.</td></tr>
<tr><td>RG5</td><td>Chaque <strong>emprunt</strong> porte une date de sortie et une date de retour prévue ; la date de retour effective est renseignée au retour.</td></tr>
<tr><td>RG6</td><td>Un adhérent ne peut détenir plus de 5 emprunts en cours ; son adhésion doit être valide.</td></tr>
</tbody>
</table>

<div class="callout note">
<span class="tag">Pourquoi ce cas</span>
<p>Il contient une association <em>plusieurs-à-plusieurs</em> porteuse de données (l'emprunt), une <em>dépendance d'identification</em> (l'exemplaire vis-à-vis de l'ouvrage), une <em>CIF</em> (la catégorie), et un processus métier net (emprunter / retourner / relancer). De quoi illustrer chaque concept de la méthode sans se noyer.</p>
</div>

<h3>Premier inventaire du vocabulaire</h3>
<p>On repère déjà les candidats-entités — <code>ADHERENT</code>, <code>OUVRAGE</code>, <code>EXEMPLAIRE</code>, <code>AUTEUR</code>, <code>CATEGORIE</code> — et un candidat-association central, <code>EMPRUNTER</code>. Le reste du document montre comment ce vocabulaire se discipline jusqu'à devenir un schéma exécutable.</p>
`},

/* ============================================================ FONDATIONS */
{id:"fondations",parent:null,num:"1",title:"Fondations",kw:"fondations histoire philosophie principes",body:`
<div class="kicker">Partie 1</div>
<h1>Fondations</h1>
<p class="lead">Avant les formalismes, l'esprit de la méthode : d'où elle vient, sur quelle vision du monde elle repose, et les deux grilles de lecture qui organisent tout le reste.</p>
<p>On ne comprend pas MERISE en mémorisant des symboles. On la comprend en saisissant <strong>deux idées combinées</strong> : séparer les données des traitements, et raisonner par niveaux d'abstraction décroissante. Ces deux axes forment une grille — la matrice qui donne sa place à chacun des modèles.</p>
<ul>
<li><a href="#histoire">1.1 — Genèse et histoire</a></li>
<li><a href="#philosophie">1.2 — Philosophie et principes</a></li>
<li><a href="#courbe-soleil">1.3 — Le cycle d'abstraction (la « courbe du soleil »)</a></li>
<li><a href="#trois-cycles">1.4 — Les trois cycles</a></li>
<li><a href="#regles-gestion">1.5 — Les règles de gestion</a></li>
<li><a href="#mcd-dictionnaire">1.6 — Le dictionnaire des données</a></li>
<li><a href="#conventions">1.7 — Conventions de notation &amp; nommage</a></li>
<li><a href="#grille">1.8 — La grille données × traitements</a></li>
</ul>
`},

{id:"histoire",parent:"fondations",num:"1.1",title:"Genèse et histoire",kw:"histoire tardieu rochfeld colletti 1979 ministère industrie sema france origine",body:`
<div class="kicker">1.1 — Fondations</div>
<h1>Genèse et histoire</h1>
<p class="lead">MERISE est un produit de son époque : la France de la fin des années 1970, où l'État cherche à industrialiser la production de ses grands systèmes informatiques.</p>

<h2>Le contexte</h2>
<p>À la fin des années 1970, l'informatique de gestion explose mais les projets dérapent : pas de méthode commune, des analyses dépendantes du fournisseur de matériel, des spécifications confondant problème métier et solution technique. Le <strong>ministère de l'Industrie</strong> commande une méthode nationale de conception des systèmes d'information.</p>

<h2>Les artisans</h2>
<p>Les travaux sont conduits autour de <strong>1977–1979</strong>, principalement dans la région d'Aix-en-Provence, par le <strong>CTI</strong> (Centre Technique Informatique) et le <strong>CETE Méditerranée</strong>, avec la société de conseil <strong>Sema</strong>. Trois noms dominent la formalisation et la diffusion :</p>
<ul>
<li><strong>Hubert Tardieu</strong> — figure de proue de la conception de la méthode ;</li>
<li><strong>Arnold Rochfeld</strong> et <strong>René Colletti</strong> — co-auteurs des ouvrages de référence qui diffuseront MERISE dans les entreprises et les écoles.</li>
</ul>
<p>L'ouvrage <em>La méthode MERISE — Principes et outils</em> (Tardieu, Rochfeld, Colletti) devient le texte canonique. Une seconde génération, <strong>MERISE/2</strong>, étendra le formalisme dans les années 1990.</p>

<h2>Les influences</h2>
<table>
<thead><tr><th>Source</th><th>Apport</th></tr></thead>
<tbody>
<tr><td>Approche systémique (Le Moigne, Forrester)</td><td>Voir l'entreprise comme un système : pilotage, information, opérant. D'où la primauté du <em>niveau conceptuel</em>.</td></tr>
<tr><td>Modèle Entité-Association (Chen, 1976)</td><td>Le socle du MCD : entités, associations, attributs.</td></tr>
<tr><td>Architecture ANSI/SPARC (1975)</td><td>Les trois schémas (externe / conceptuel / interne) inspirent l'idée de niveaux d'abstraction.</td></tr>
<tr><td>Modèle relationnel (Codd, 1970)</td><td>La cible logique : le MLD est un schéma relationnel normalisé.</td></tr>
</tbody>
</table>

<div class="callout note">
<span class="tag">Le sigle</span>
<p>« MERISE » est souvent glosé en <em>Méthode d'Étude et de Réalisation Informatique pour les Systèmes d'Entreprise</em>, mais ce développement est un acronyme reconstruit a posteriori. Le nom évoque surtout le merisier — un arbre dont le bois sert de porte-greffe, métaphore d'une méthode sur laquelle on greffe les projets.</p>
</div>
`},

{id:"philosophie",parent:"fondations",num:"1.2",title:"Philosophie et principes",kw:"philosophie principes séparation données traitements abstraction systémique invariant",body:`
<div class="kicker">1.2 — Fondations</div>
<h1>Philosophie et principes</h1>
<p class="lead">Deux principes fondateurs, qui se croisent pour former toute la méthode.</p>

<h2>Principe 1 — Séparer données et traitements</h2>
<p>MERISE distingue radicalement :</p>
<ul>
<li>les <strong>données</strong> — la part <em>statique</em> du système, ce qu'il mémorise (un adhérent, un emprunt) ;</li>
<li>les <strong>traitements</strong> — la part <em>dynamique</em>, ce que le système fait en réaction à des événements (enregistrer un emprunt, relancer un retard).</li>
</ul>
<p>La justification est empirique : les données sont <strong>stables</strong> dans le temps (la notion d'« emprunt » survit aux réorganisations), tandis que les traitements <strong>changent</strong> au gré des procédures et des outils. En les séparant, on protège le cœur stable du système des turbulences de l'organisation.</p>

<div class="callout warn">
<span class="tag">Point de friction moderne</span>
<p>Ce principe est exactement l'inverse de l'orienté-objet et du DDD, qui <em>encapsulent</em> données et comportement dans les mêmes objets. Cette divergence est le sujet du pont <a href="#ddd">MERISE &amp; DDD</a>.</p>
</div>

<h2>Principe 2 — Raisonner par niveaux d'abstraction</h2>
<p>On ne décide pas tout en même temps. La méthode impose un ordre :</p>
<ol>
<li><strong>Conceptuel</strong> — le <em>quoi</em>. Le sens métier, indépendant de toute organisation et de toute technique. « Un adhérent emprunte des exemplaires. »</li>
<li><strong>Organisationnel / Logique</strong> — le <em>qui, où, quand</em> (traitements) et le <em>avec quelle structure logique</em> (données). On introduit les choix d'organisation et de modèle (le relationnel).</li>
<li><strong>Physique / Opérationnel</strong> — le <em>comment</em>. Le SGBD précis, le SQL, les programmes.</li>
</ol>
<p>La règle d'or : <strong>chaque niveau est validé avant de descendre</strong>. On ne contamine pas le conceptuel par des considérations de performance.</p>

<h2>La notion d'invariant</h2>
<p>Le niveau conceptuel cherche les <strong>invariants</strong> : ce qui est vrai quelle que soit l'organisation. Que la médiathèque enregistre les prêts sur un cahier ou sur une borne tactile, la réalité « un adhérent emprunte un exemplaire à une date » ne change pas. C'est cet invariant que capture le MCD.</p>
`},

{id:"courbe-soleil",parent:"fondations",num:"1.3",title:"Le cycle d'abstraction (courbe du soleil)",kw:"courbe soleil cycle abstraction descente remontée conceptuel logique physique niveaux",body:`
<div class="kicker">1.3 — Fondations</div>
<h1>Le cycle d'abstraction — la « courbe du soleil »</h1>
<p class="lead">L'image pédagogique la plus célèbre de la méthode : la conception descend du concept vers la machine, la réalisation remonte.</p>

<h2>La métaphore</h2>
<p>On représente la démarche comme la course du soleil. À gauche, on <strong>descend</strong> les niveaux d'abstraction pendant la conception : du conceptuel (le plus abstrait, en haut) vers le physique (le plus concret, en bas). À droite, on <strong>remonte</strong> pendant la réalisation et la recette : on assemble le physique pour vérifier qu'on a bien répondu au besoin conceptuel.</p>

<figure class="fig">
<svg viewBox="0 0 720 350" role="img" aria-label="Courbe du soleil : descente conceptuel vers physique pendant la conception, remontée pendant la réalisation">
  <!-- lanes -->
  <rect class="s-fill-paper2" x="150" y="40" width="555" height="86" rx="6" opacity="0.55"/>
  <rect class="s-fill-paper2" x="150" y="134" width="555" height="86" rx="6" opacity="0.30"/>
  <rect class="s-fill-paper2" x="150" y="228" width="555" height="86" rx="6" opacity="0.55"/>
  <!-- lane labels -->
  <text class="s-txt s-bold" x="142" y="78" text-anchor="end">CONCEPTUEL</text>
  <text class="s-mut s-mono" x="142" y="96" text-anchor="end">le QUOI</text>
  <text class="s-txt s-bold" x="142" y="172" text-anchor="end">ORGANISATIONNEL / LOGIQUE</text>
  <text class="s-mut s-mono" x="142" y="190" text-anchor="end">QUI · OÙ · QUAND</text>
  <text class="s-txt s-bold" x="142" y="266" text-anchor="end">PHYSIQUE / OPÉRATIONNEL</text>
  <text class="s-mut s-mono" x="142" y="284" text-anchor="end">le COMMENT</text>
  <!-- the sun curve (U) -->
  <path class="s-accent-s" style="stroke-width:3" d="M 205 80 C 215 215, 305 292, 428 292 C 551 292, 641 215, 651 80"/>
  <!-- crossing dots -->
  <circle class="s-accent" cx="232" cy="134" r="4"/>
  <circle class="s-accent" cx="288" cy="228" r="4"/>
  <circle class="s-accent" cx="568" cy="228" r="4"/>
  <circle class="s-accent" cx="624" cy="134" r="4"/>
  <!-- sun (start) -->
  <g>
    <circle class="s-accent" cx="205" cy="80" r="13"/>
    <g class="s-accent-s" style="stroke-width:2">
      <line x1="205" y1="55" x2="205" y2="44"/><line x1="205" y1="105" x2="205" y2="116"/>
      <line x1="180" y1="80" x2="169" y2="80"/><line x1="230" y1="80" x2="241" y2="80"/>
      <line x1="187" y1="62" x2="179" y2="54"/><line x1="223" y1="98" x2="231" y2="106"/>
    </g>
  </g>
  <!-- end marker (check) -->
  <circle class="s-blue" cx="651" cy="80" r="13"/>
  <path d="M 645 80 l 4 5 l 8 -10" style="stroke:var(--paper);stroke-width:2.5;fill:none"/>
  <!-- descent arrow -->
  <g class="s-accent">
    <text class="s-bold" x="250" y="175" font-size="12">CONCEPTION</text>
    <path d="M 262 185 l 8 0 l -4 9 z"/>
  </g>
  <!-- ascent arrow -->
  <g class="s-blue">
    <text class="s-bold" x="560" y="178" font-size="12" text-anchor="end">RÉALISATION</text>
    <path d="M 596 184 l 8 0 l -4 -9 z"/>
  </g>
  <!-- nadir label -->
  <text class="s-mut" x="428" y="330" text-anchor="middle" font-size="12">passage à la technique · codage · intégration</text>
</svg>
<figcaption>La « courbe du soleil » : on descend les niveaux d'abstraction pendant la conception (gauche), on les remonte pendant la réalisation et la recette (droite).</figcaption>
</figure>

<h2>Pourquoi descendre lentement</h2>
<p>Chaque palier ne traite qu'<strong>une catégorie de décisions</strong>. Le conceptuel ignore l'ordinateur ; l'organisationnel ignore le SGBD ; le physique tranche enfin la technique. On évite ainsi le piège classique : confondre un problème métier (« comment représenter un emprunt ? ») avec un problème technique (« faut-il un index sur la date ? »).</p>

<div class="callout note">
<span class="tag">À retenir</span>
<p>La « courbe du soleil » se décline <em>en parallèle</em> sur les deux axes : on a une descente conceptuel→physique pour les <strong>données</strong> (MCD→MLD→MPD) et une autre pour les <strong>traitements</strong> (MCT→MOT→MOpT). La <a href="#grille">grille</a> les met côte à côte.</p>
</div>
`},

{id:"trois-cycles",parent:"fondations",num:"1.4",title:"Les trois cycles",kw:"trois cycles abstraction vie décision schéma directeur étude préalable maintenance",body:`
<div class="kicker">1.4 — Fondations</div>
<h1>Les trois cycles</h1>
<p class="lead">MERISE articule trois dynamiques qui se déroulent simultanément sur un projet.</p>

<h2>1 — Le cycle d'abstraction</h2>
<p>Déjà vu : conceptuel → organisationnel/logique → physique/opérationnel. Il décrit <strong>la nature des décisions</strong> prises à chaque palier. C'est l'axe vertical de la méthode.</p>

<h2>2 — Le cycle de vie</h2>
<p>Le déroulement temporel du projet, du premier cadrage à la disparition du système :</p>
<table>
<thead><tr><th>Étape</th><th>Objet</th></tr></thead>
<tbody>
<tr><td>Schéma directeur</td><td>Vision stratégique : quels domaines informatiser, dans quel ordre.</td></tr>
<tr><td>Étude préalable</td><td>Pour un domaine : analyse de l'existant, scénarios, premiers modèles conceptuels.</td></tr>
<tr><td>Étude détaillée</td><td>Spécifications complètes : MCD/MCT affinés, MOT, validation utilisateur.</td></tr>
<tr><td>Étude technique</td><td>Choix physiques : MPD, architecture, optimisation.</td></tr>
<tr><td>Réalisation</td><td>Développement, tests.</td></tr>
<tr><td>Mise en œuvre</td><td>Déploiement, formation, reprise de données.</td></tr>
<tr><td>Maintenance</td><td>Corrective et évolutive, jusqu'au retrait.</td></tr>
</tbody>
</table>

<h2>3 — Le cycle de décision</h2>
<p>À chaque étape correspondent des <strong>points de décision</strong> (souvent appelés jalons ou « go/no-go ») où la maîtrise d'ouvrage arbitre : valider un scénario, choisir une cible technique, lancer la réalisation. Ce cycle relie la technique à la gouvernance du projet.</p>

<div class="callout note">
<span class="tag">Lecture croisée</span>
<p>Les trois cycles forment un espace à trois dimensions : <em>où en est-on dans le temps</em> (cycle de vie), <em>à quel niveau d'abstraction travaille-t-on</em> (cycle d'abstraction), <em>qui décide quoi</em> (cycle de décision). Un livrable MERISE se situe toujours quelque part dans ce volume.</p>
</div>
`},

{id:"regles-gestion",parent:"fondations",num:"1.5",title:"Les règles de gestion",kw:"règle gestion business rule formulation typologie structure contrôle calcul action atomique métier RG quota",body:`
<div class="kicker">1.5 — Fondations</div>
<h1>Les règles de gestion</h1>
<p class="lead">La matière première de toute la méthode. Avant le moindre modèle, on recueille et on formule les règles qui décrivent le fonctionnement du métier — tout le reste en dérive.</p>

<h2>Ce qu'est une règle de gestion</h2>
<p>Une <strong>règle de gestion</strong> est une assertion qui décrit ou contraint un aspect du métier, indépendamment de toute solution informatique. Elle énonce une vérité du domaine : « un adhérent ne peut détenir plus de cinq emprunts ». C'est le pont entre le langage des utilisateurs et les modèles : le MCD, le MCT et les contraintes physiques ne sont, au fond, que des règles de gestion <em>traduites</em> dans des formalismes.</p>

<h2>D'où viennent-elles</h2>
<ul>
<li><strong>entretiens</strong> avec les acteurs métier (la maîtrise d'ouvrage) ;</li>
<li><strong>documents existants</strong> : formulaires, écrans, états imprimés, procédures, contrats ;</li>
<li><strong>réglementation</strong> et obligations légales ;</li>
<li><strong>observation</strong> du fonctionnement réel.</li>
</ul>

<h2>Comment les formuler</h2>
<p>Une règle bien formulée respecte quelques critères — les mêmes qui feront, plus tard, un bon modèle :</p>
<table>
<thead><tr><th>Critère</th><th>Signification</th></tr></thead>
<tbody>
<tr><td>Atomique</td><td>une seule idée par règle ; on découpe les règles composées.</td></tr>
<tr><td>Non ambiguë</td><td>vérifiable, sans interprétation possible (« plus de 5 », pas « beaucoup »).</td></tr>
<tr><td>En langage métier</td><td>aucun terme technique (ni table, ni champ, ni écran).</td></tr>
<tr><td>Indépendante de la solution</td><td>elle dit le <em>quoi</em>, jamais le <em>comment</em> informatique.</td></tr>
<tr><td>Traçable</td><td>numérotée (RG1, RG2…) pour être suivie jusqu'au code.</td></tr>
<tr><td>Cohérente</td><td>sans contradiction avec les autres règles.</td></tr>
</tbody>
</table>

<h3>Anatomie d'une règle</h3>
<figure class="fig">
<svg viewBox="0 0 700 232" role="img" aria-label="Décomposition d'une règle en sujet, quantificateur, objet, condition">
  <text class="s-mut s-mono" x="10" y="20">RG6 — décomposée</text>
  <rect class="s-blue" x="10" y="28" width="170" height="40" rx="6"/>
  <text x="95" y="53" text-anchor="middle" style="fill:var(--paper);font-size:11px;font-weight:700">SUJET</text>
  <rect class="s-fill-paper2" x="190" y="28" width="500" height="40" rx="6"/>
  <text class="s-txt" x="206" y="53" font-size="14">Un adhérent</text>
  <rect class="s-accent" x="10" y="76" width="170" height="40" rx="6"/>
  <text x="95" y="95" text-anchor="middle" style="fill:var(--paper);font-size:10px;font-weight:700">QUANTIFICATEUR</text>
  <text x="95" y="109" text-anchor="middle" style="fill:var(--paper);font-size:9px">la contrainte chiffrée</text>
  <rect class="s-fill-paper2" x="190" y="76" width="500" height="40" rx="6"/>
  <text class="s-txt" x="206" y="101" font-size="14">ne peut détenir plus de 5</text>
  <rect class="s-blue" x="10" y="124" width="170" height="40" rx="6"/>
  <text x="95" y="149" text-anchor="middle" style="fill:var(--paper);font-size:11px;font-weight:700">OBJET</text>
  <rect class="s-fill-paper2" x="190" y="124" width="500" height="40" rx="6"/>
  <text class="s-txt" x="206" y="149" font-size="14">emprunts en cours</text>
  <rect class="s-accent" x="10" y="172" width="170" height="40" rx="6"/>
  <text x="95" y="197" text-anchor="middle" style="fill:var(--paper);font-size:11px;font-weight:700">CONDITION</text>
  <rect class="s-fill-paper2" x="190" y="172" width="500" height="40" rx="6"/>
  <text class="s-txt" x="206" y="197" font-size="14">si son adhésion est valide</text>
</svg>
<figcaption>Décomposer une règle en sujet · quantificateur · objet · condition la rend atomique et vérifiable.</figcaption>
</figure>

<h2>Une typologie utile</h2>
<p>Classer les règles oriente directement leur traduction dans les modèles :</p>
<table>
<thead><tr><th>Type</th><th>Décrit…</th><th>Se traduit dans…</th></tr></thead>
<tbody>
<tr><td>Règle de structure</td><td>l'existence et les liens entre données</td><td>le <a href="#mcd">MCD</a> (entités, associations, cardinalités)</td></tr>
<tr><td>Règle de calcul</td><td>une donnée déduite d'autres (formule)</td><td>les <a href="#mct">traitements</a> ; donnée non stockée</td></tr>
<tr><td>Règle de contrôle</td><td>une condition de validité à respecter</td><td>les traitements et/ou des contraintes <code>CHECK</code></td></tr>
<tr><td>Règle d'action</td><td>un comportement déclenché par un événement</td><td>le <a href="#mct">MCT</a> (opérations, règles d'émission)</td></tr>
</tbody>
</table>

<div class="callout fr">
<span class="tag">Fil rouge — classer nos six règles</span>
<table>
<thead><tr><th>Règle</th><th>Type</th><th>Destination</th></tr></thead>
<tbody>
<tr><td>RG1 — exemplaires d'un ouvrage</td><td>structure</td><td>MCD · cardinalité (1,n)</td></tr>
<tr><td>RG2 — auteurs d'un ouvrage</td><td>structure</td><td>MCD · association (n,n)</td></tr>
<tr><td>RG3 — catégorie d'un ouvrage</td><td>structure</td><td>MCD · CIF</td></tr>
<tr><td>RG4 — un emprunteur à la fois</td><td>structure + contrôle</td><td>MCD + traitement</td></tr>
<tr><td>RG5 — dates d'emprunt</td><td>structure</td><td>MCD · propriétés de l'association</td></tr>
<tr><td>RG6 — quota de 5 + adhésion valide</td><td>contrôle</td><td>MCT · opération « Enregistrer l'emprunt »</td></tr>
</tbody>
</table>
</div>

<div class="callout warn">
<span class="tag">La règle qui ne se dessine pas</span>
<p>RG6 (le quota) est l'exemple canonique de la règle <em>de contrôle</em> : aucune cardinalité, aucune contrainte de schéma ne l'exprime. Elle vivra dans un <a href="#mct">traitement</a>. Repérer dès la formulation qu'une règle est « de structure » ou « de contrôle », c'est déjà savoir vers quel modèle elle ira — et pourquoi MERISE a besoin de ses deux axes.</p>
</div>

<h2>De la règle au modèle</h2>
<p>L'enchaînement amont est toujours le même : on recueille les <strong>règles de gestion</strong>, on en extrait le vocabulaire dans le <a href="#mcd-dictionnaire">dictionnaire des données</a>, puis on en déduit le <a href="#mcd">MCD</a> et le <a href="#mct">MCT</a>. Les deux nœuds suivants outillent précisément ces étapes.</p>
`},

{id:"mcd-dictionnaire",parent:"fondations",num:"1.6",title:"Le dictionnaire des données",kw:"dictionnaire données data dictionary désignation type longueur nature calculée concaténée épuration synonyme polysème domaine valeurs dépendance fonctionnelle catalog ubiquitous",body:`
<div class="kicker">1.6 — Fondations</div>
<h1>Le dictionnaire des données</h1>
<p class="lead">L'inventaire exhaustif et épuré de toutes les données élémentaires du système. C'est le chaînon entre les règles de gestion et le MCD — et l'ancêtre direct de ce que le DDD appellera l'<em>ubiquitous language</em>.</p>

<h2>Son rôle</h2>
<ul>
<li><strong>recenser</strong> sans oubli toute donnée que le système devra mémoriser ou produire ;</li>
<li><strong>fixer le vocabulaire</strong> : un nom = une donnée = une définition partagée entre métier et technique ;</li>
<li><strong>préparer le MCD</strong> : les données épurées et leurs dépendances se regroupent ensuite en entités et associations ;</li>
<li><strong>servir de référence</strong> tout au long du projet (types, longueurs, contraintes).</li>
</ul>

<h2>Quand le produit-on</h2>
<p>Très en amont, juste après (ou pendant) le recueil des <a href="#regles-gestion">règles de gestion</a>, à partir des entretiens et de <em>tous</em> les supports d'information existants : formulaires, écrans, états imprimés, fichiers. On y traque chaque donnée nommée.</p>

<h2>Comment l'organiser</h2>
<p>Un tableau, une ligne par donnée élémentaire. Les colonnes usuelles :</p>
<table>
<thead><tr><th>Colonne</th><th>Contenu</th></tr></thead>
<tbody>
<tr><td>Code</td><td>nom court et mnémonique (souvent préfixé par l'entité)</td></tr>
<tr><td>Désignation</td><td>libellé clair en langage métier</td></tr>
<tr><td>Type</td><td>A (alpha), N (numérique), AN (alphanumérique), date, booléen</td></tr>
<tr><td>Longueur</td><td>taille ou précision</td></tr>
<tr><td>Nature</td><td>élémentaire · calculée · concaténée · paramètre</td></tr>
<tr><td>Règle / domaine</td><td>formule si calculée, domaine de valeurs, contrainte</td></tr>
<tr><td>Rattachement</td><td>(ajouté ensuite) l'entité ou l'association d'accueil</td></tr>
</tbody>
</table>

<h2>Comment le développer : l'épuration</h2>
<p>Le recensement brut est toujours redondant et bruité. On le « purifie » en quatre passes :</p>
<figure class="fig">
<svg viewBox="0 0 720 150" role="img" aria-label="Pipeline d'épuration du dictionnaire des données">
  <rect class="s-box" x="8" y="42" width="150" height="60" rx="8"/>
  <text class="s-txt s-bold" x="83" y="68" text-anchor="middle" font-size="13">Recensement</text>
  <text class="s-mut" x="83" y="86" text-anchor="middle" font-size="11">brut, redondant</text>
  <path class="s-line" d="M 162 72 H 196"/><path class="s-accent" d="M 196 67 l 9 5 l -9 5 z"/>
  <rect class="s-assoc" x="210" y="34" width="172" height="76" rx="8"/>
  <text class="s-assoct" x="296" y="56" text-anchor="middle" font-size="13">Épuration</text>
  <text class="s-mut" x="296" y="74" text-anchor="middle" font-size="9.5">synonymes · polysèmes</text>
  <text class="s-mut" x="296" y="88" text-anchor="middle" font-size="9.5">calculées · concaténées</text>
  <path class="s-line" d="M 386 72 H 420"/><path class="s-accent" d="M 420 67 l 9 5 l -9 5 z"/>
  <rect class="s-box" x="434" y="42" width="150" height="60" rx="8"/>
  <text class="s-txt s-bold" x="509" y="68" text-anchor="middle" font-size="13">Données</text>
  <text class="s-mut" x="509" y="86" text-anchor="middle" font-size="11">élémentaires</text>
  <path class="s-line" d="M 588 72 H 622"/><path class="s-blue" d="M 622 67 l 9 5 l -9 5 z"/>
  <rect class="s-box" x="636" y="42" width="76" height="60" rx="8" style="stroke:var(--blue)"/>
  <text class="s-blue s-bold" x="674" y="68" text-anchor="middle" font-size="13">MCD</text>
  <text class="s-mut" x="674" y="86" text-anchor="middle" font-size="9">via les DF</text>
</svg>
<figcaption>Du recensement brut au MCD : l'épuration ne conserve que des données élémentaires, uniques et atomiques.</figcaption>
</figure>
<ol>
<li><strong>Synonymes</strong> — deux noms pour une même donnée (« client », « adhérent ») : on n'en garde qu'un.</li>
<li><strong>Polysèmes</strong> — un nom pour deux données distinctes (« date » de sortie ? de retour ?) : on les dédouble.</li>
<li><strong>Données calculées</strong> — déductibles d'autres (l'âge, le nombre d'emprunts en cours) : on les marque et on ne les stocke pas.</li>
<li><strong>Données concaténées</strong> — agrégats non atomiques (« nom complet ») : on les décompose en éléments.</li>
</ol>

<h2>Des dépendances aux entités</h2>
<p>Sur ce dictionnaire épuré, on établit les <strong>dépendances fonctionnelles</strong> (DF) : <code>A → B</code> signifie que connaître A détermine B. Chaque déterminant devient candidat-identifiant d'une entité, et les données qui en dépendent s'y regroupent. C'est le passage du dictionnaire au <a href="#mcd">MCD</a> — et le socle de la <a href="#mld-normalisation">normalisation</a> au niveau logique.</p>

<div class="callout fr">
<span class="tag">Fil rouge — extrait du dictionnaire épuré</span>
<table>
<thead><tr><th>Code</th><th>Désignation</th><th>Type</th><th>Long.</th><th>Nature</th></tr></thead>
<tbody>
<tr><td>numAdherent</td><td>Identifiant adhérent</td><td>N</td><td>6</td><td>élémentaire (id)</td></tr>
<tr><td>nomAdherent</td><td>Nom de l'adhérent</td><td>A</td><td>40</td><td>élémentaire</td></tr>
<tr><td>dateAdhesion</td><td>Date d'adhésion</td><td>date</td><td>—</td><td>élémentaire</td></tr>
<tr><td>titre</td><td>Titre de l'ouvrage</td><td>AN</td><td>200</td><td>élémentaire</td></tr>
<tr><td>isbn</td><td>ISBN</td><td>AN</td><td>17</td><td>élémentaire (unique)</td></tr>
<tr><td>dateSortie</td><td>Date de sortie d'emprunt</td><td>date</td><td>—</td><td>élémentaire</td></tr>
<tr><td>nbEmpruntsEnCours</td><td>Nombre d'emprunts en cours</td><td>N</td><td>2</td><td><em>calculée → exclue</em></td></tr>
<tr><td>ageAdherent</td><td>Âge de l'adhérent</td><td>N</td><td>3</td><td><em>calculée → exclue</em></td></tr>
</tbody>
</table>
<p>DF clés : <code>numAdherent → nomAdherent, dateAdhesion</code> · <code>numOuvrage → titre, isbn, codeCategorie</code> · <code>(numAdherent, numExemplaire, dateSortie) → dateRetourPrevue</code>.</p>
</div>

<div class="callout note">
<span class="tag">Écho moderne</span>
<p>Le dictionnaire des données est l'ancêtre de plusieurs pratiques actuelles : le <em>data catalog</em>, le glossaire métier, et l'<em>ubiquitous language</em> du DDD. Tous répondent au même besoin — un vocabulaire unique, défini et partagé. Voir <a href="#ddd">MERISE &amp; DDD</a>.</p>
</div>
`},

{id:"conventions",parent:"fondations",num:"1.7",title:"Conventions de notation & nommage",kw:"conventions notation nommage formalisme singulier majuscules verbe souligné identifiant clé étrangère dièse rectangle ellipse cardinalité représentation graphique planche",body:`
<div class="kicker">1.7 — Fondations</div>
<h1>Conventions de notation &amp; nommage</h1>
<p class="lead">MERISE n'impose pas qu'une démarche, mais une <em>grammaire</em> : un vocabulaire graphique et des règles de nommage qui rendent les schémas lisibles et univoques. Les voici réunis en planche de référence.</p>

<h2>Le formalisme graphique du MCD</h2>
<figure class="fig">
<svg viewBox="0 0 720 290" role="img" aria-label="Planche des conventions de notation du MCD">
  <rect class="s-box" x="60" y="92" width="160" height="84" rx="3"/>
  <rect class="s-boxh" x="60" y="92" width="160" height="28"/>
  <text class="s-boxht" x="140" y="111" text-anchor="middle">ADHERENT</text>
  <text class="s-txt s-mono" x="74" y="140" font-size="12" style="text-decoration:underline">numAdherent</text>
  <text class="s-txt s-mono" x="74" y="160" font-size="12">nom</text>
  <path class="s-line" d="M 220 134 H 302"/>
  <text class="s-card" x="234" y="126">0,n</text>
  <ellipse class="s-assoc" cx="362" cy="134" rx="60" ry="30"/>
  <text class="s-assoct" x="362" y="139" text-anchor="middle">Emprunter</text>
  <path class="s-line" d="M 422 134 H 500"/>
  <text class="s-card" x="468" y="126">0,n</text>
  <rect class="s-box" x="500" y="100" width="160" height="68" rx="3"/>
  <rect class="s-boxh" x="500" y="100" width="160" height="28"/>
  <text class="s-boxht" x="580" y="119" text-anchor="middle">EXEMPLAIRE</text>
  <text class="s-txt s-mono" x="514" y="148" font-size="12" style="text-decoration:underline">numExemplaire</text>
  <path class="s-accent-s s-dash" d="M 140 92 V 64"/>
  <text class="s-accent" x="140" y="54" text-anchor="middle" font-size="11" font-weight="700">Entité : rectangle, nom au singulier en MAJUSCULES</text>
  <path class="s-accent-s s-dash" d="M 362 164 V 198"/>
  <text class="s-accent" x="362" y="216" text-anchor="middle" font-size="11" font-weight="700">Association : ellipse, nom = verbe</text>
  <path class="s-blue-s s-dash" d="M 96 144 V 244"/>
  <text class="s-blue" x="96" y="262" text-anchor="middle" font-size="11" font-weight="700">Identifiant : souligné</text>
  <path class="s-blue-s s-dash" d="M 244 126 V 244"/>
  <text class="s-blue" x="430" y="262" text-anchor="middle" font-size="11" font-weight="700">Cardinalité (min,max) : côté entité</text>
</svg>
<figcaption>La grammaire graphique du MCD en un coup d'œil.</figcaption>
</figure>

<h2>Règles de nommage</h2>
<table>
<thead><tr><th>Élément</th><th>Convention</th><th>Exemple</th></tr></thead>
<tbody>
<tr><td>Entité</td><td>substantif au <strong>singulier</strong>, en MAJUSCULES</td><td><code>ADHERENT</code>, <code>OUVRAGE</code></td></tr>
<tr><td>Association</td><td><strong>verbe</strong> (infinitif ou participe) ; forme la phrase entité-verbe-entité</td><td><code>Emprunter</code>, <code>Appartenir</code></td></tr>
<tr><td>Propriété</td><td>minuscules, nom métier atomique ; préfixe possible par l'entité</td><td><code>nomAdherent</code>, <code>dateSortie</code></td></tr>
<tr><td>Identifiant</td><td><u>souligné</u> ; souvent préfixe <code>num</code> ou <code>code</code></td><td><code><u>numAdherent</u></code></td></tr>
<tr><td>Cardinalité</td><td>couple <code>(min,max)</code> sur la patte, <strong>côté entité</strong></td><td><code>(0,n)</code>, <code>(1,1)</code></td></tr>
</tbody>
</table>

<h2>La notation textuelle du MLD</h2>
<p>Au niveau logique, on quitte le dessin pour une écriture compacte :</p>
<pre><code>RELATION (<u>cléPrimaire</u>, attribut1, attribut2, #cléEtrangere)</code></pre>
<ul>
<li>nom de relation en MAJUSCULES, attributs entre parenthèses ;</li>
<li>clé primaire <u>soulignée</u> (parfois en gras) ;</li>
<li>clé étrangère préfixée d'un <code>#</code> (parfois notée en italique selon les ouvrages) ;</li>
<li>une clé peut être à la fois primaire et étrangère (tables d'association).</li>
</ul>

<div class="callout warn">
<span class="tag">Dialectes</span>
<p>Ces conventions sont celles de MERISE « classique » (Tardieu-Rochfeld-Colletti). Les outils et ouvrages varient : sens de lecture des cardinalités, symbole de la CIF, « patte d'oie » (Crow's Foot) plutôt qu'ellipses dans les modeleurs anglo-saxons. Le fond reste identique — voir <a href="#er-chen">MERISE vs Entité-Association (Chen)</a> pour la correspondance des notations.</p>
</div>

<div class="callout note">
<span class="tag">Pourquoi s'y tenir</span>
<p>La rigueur de nommage n'est pas cosmétique : « entité au singulier » force à penser une occurrence-type ; « association = verbe » teste la validité sémantique du lien (si aucun verbe ne vient, le lien est douteux) ; l'identifiant souligné et le <code>#</code> rendent le passage au relationnel mécanique. La convention <em>fait partie</em> du raisonnement.</p>
</div>
`},

{id:"grille",parent:"fondations",num:"1.8",title:"La grille données × traitements",kw:"grille matrice données traitements communication mcd mld mpd mct mot mopt mcc modèles tableau",body:`
<div class="kicker">1.8 — Fondations</div>
<h1>La grille données × traitements</h1>
<p class="lead">La carte maîtresse de MERISE : croiser les trois niveaux d'abstraction avec les axes Données, Traitements et Communication donne sa place exacte à chaque modèle.</p>

<table class="grille">
<thead><tr><th></th><th>Données (statique)</th><th>Traitements (dynamique)</th><th>Communication (flux)</th></tr></thead>
<tbody>
<tr>
<td class="axis">Conceptuel</td>
<td><div class="lv">le quoi</div><div class="mod">MCD</div></td>
<td><div class="lv">le quoi</div><div class="mod">MCT</div></td>
<td><div class="lv">le quoi</div><div class="mod">MCC</div></td>
</tr>
<tr>
<td class="axis">Organisationnel / Logique</td>
<td><div class="lv">structure logique</div><div class="mod">MLD</div></td>
<td><div class="lv">qui · où · quand</div><div class="mod">MOT</div></td>
<td class="empty">—</td>
</tr>
<tr>
<td class="axis">Physique / Opérationnel</td>
<td><div class="lv">le comment</div><div class="mod">MPD</div></td>
<td><div class="lv">le comment</div><div class="mod">MOpT</div></td>
<td class="empty">—</td>
</tr>
</tbody>
</table>

<h2>Décodage des sigles</h2>
<ul>
<li><strong>MCD</strong> — Modèle Conceptuel des Données · <strong>MLD</strong> — Modèle Logique des Données · <strong>MPD</strong> — Modèle Physique des Données.</li>
<li><strong>MCT</strong> — Modèle Conceptuel des Traitements · <strong>MOT</strong> — Modèle Organisationnel des Traitements · <strong>MOpT</strong> — Modèle Opérationnel (ou physique) des Traitements.</li>
<li><strong>MCC</strong> — Modèle Conceptuel de la Communication (le diagramme des flux), souvent le tout premier modèle produit.</li>
</ul>

<div class="callout note">
<span class="tag">Comment s'en servir</span>
<p>Cette grille est un <em>tableau de bord</em> de la conception : à tout moment on sait quel modèle on est en train de produire et lesquels restent à faire. Le travail descend case par case, en validant la cohérence horizontale (données ↔ traitements d'un même niveau) à chaque palier.</p>
</div>
<p>La suite du document parcourt cette grille colonne par colonne : d'abord <a href="#donnees">les Données</a>, puis <a href="#traitements">les Traitements</a>, enfin <a href="#communication">la Communication</a>.</p>
`},

{id:"mcd",parent:"donnees",num:"2.1",title:"Modèle Conceptuel des Données (MCD)",kw:"mcd modèle conceptuel données entité association entité-association chen formalisme",body:`
<div class="kicker">2.1 — Données</div>
<h1>Modèle Conceptuel des Données (MCD)</h1>
<p class="lead">Le cœur historique de MERISE : une représentation graphique, indépendante de toute technique, de ce dont le système doit se souvenir.</p>

<h2>Ce qu'est un MCD</h2>
<p>Le MCD est un <strong>modèle entité-association</strong> : on décrit le monde avec des <em>entités</em> (les choses dont on parle), leurs <em>propriétés</em> (ce qu'on en sait), et des <em>associations</em> (les liens entre elles), qualifiées par des <em>cardinalités</em>. Aucune notion de table, de clé étrangère ou de fichier : ce vocabulaire-là appartient au niveau logique.</p>

<div class="diagram">
  <div class="ent"><div class="h">ADHERENT</div><div class="b"><span class="id">numAdherent</span><br>nom<br>prenom<br>dateAdhesion</div></div>
  <div class="rel"><span class="card-min">0,n</span><div class="line"></div><div class="oval">Emprunter</div><div class="line"></div><span class="card-min">0,n</span></div>
  <div class="ent"><div class="h">EXEMPLAIRE</div><div class="b"><span class="id">numExemplaire</span><br>etat</div></div>
</div>
<p style="text-align:center;color:var(--muted);font-size:13px;margin-top:-10px">Extrait du MCD de la médiathèque : deux entités reliées par une association porteuse de dates.</p>

<h2>Les briques du MCD</h2>
<p>Chaque brique fait l'objet d'une page dédiée :</p>
<ul>
<li><a href="#mcd-entite">2.1.1 — Entités</a></li>
<li><a href="#mcd-propriete">2.1.2 — Propriétés</a></li>
<li><a href="#mcd-identifiant">2.1.3 — Identifiants</a></li>
<li><a href="#mcd-association">2.1.4 — Associations</a></li>
<li><a href="#mcd-cardinalites">2.1.5 — Cardinalités</a></li>
<li><a href="#mcd-dimensions">2.1.6 — Dimension des associations</a></li>
<li><a href="#mcd-cif">2.1.7 — La CIF</a></li>
<li><a href="#mcd-faible">2.1.8 — Dépendance d'identification</a></li>
<li><a href="#mcd-heritage">2.1.9 — Héritage (spécialisation)</a></li>
<li><a href="#mcd-contraintes">2.1.10 — Contraintes inter-associations</a></li>
</ul>

<div class="callout warn">
<span class="tag">Deux dialectes</span>
<p>Attention aux variantes de formalisme : MERISE place les cardinalités <em>côté entité</em>, sous la forme d'un couple <code>(min,max)</code>. Le formalisme de Chen, lui, n'écrit qu'un cardinal (1 ou N) et le place différemment. Les deux décrivent la même chose mais ne se lisent pas pareil — voir <a href="#er-chen">MERISE vs Entité-Association (Chen)</a>.</p>
</div>

<h2>Le MCD complet de la médiathèque</h2>
