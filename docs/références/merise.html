{id:"mcd-entite",parent:"mcd",num:"2.1.1",title:"Entités",kw:"entité objet occurrence individu type rectangle réalité",body:`
<div class="kicker">2.1.1 — MCD</div>
<h1>Entités</h1>
<p class="lead">Une entité représente une catégorie de choses du monde réel dont le système doit conserver une trace.</p>

<h2>Définition</h2>
<p>Une <strong>entité</strong> (ou <em>type-entité</em>, parfois « objet ») est un ensemble d'objets de même nature, perçus comme ayant une existence propre : <code>ADHERENT</code>, <code>OUVRAGE</code>, <code>EXEMPLAIRE</code>. On la dessine par un rectangle portant son nom (par convention au singulier, en majuscules).</p>
<p>Une <strong>occurrence</strong> (ou individu) est un élément particulier de l'entité : « l'adhérente Camille Roux, n°4012 » est une occurrence de <code>ADHERENT</code>.</p>

<h2>Le test d'existence</h2>
<p>Une bonne entité possède une existence <em>autonome</em> dans le discours métier. Avant de créer une entité, on se demande : « peut-elle exister indépendamment, et a-t-elle plusieurs occurrences qu'on veut distinguer ? »</p>
<ul>
<li><code>AUTEUR</code> ✔ — existe en soi, on en distingue plusieurs.</li>
<li><code>adresse</code> ✘ — c'est plutôt une <em>propriété</em> de l'adhérent, sauf si le métier veut la gérer comme une chose à part entière (livraisons multiples…).</li>
</ul>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p>De nos règles de gestion émergent cinq entités candidates : <code>ADHERENT</code>, <code>OUVRAGE</code>, <code>EXEMPLAIRE</code>, <code>AUTEUR</code>, <code>CATEGORIE</code>. Noter la distinction subtile entre <code>OUVRAGE</code> (l'œuvre abstraite, un ISBN) et <code>EXEMPLAIRE</code> (l'objet physique posé sur l'étagère) : c'est elle qui rend le modèle juste — on n'emprunte pas un ISBN, on emprunte un livre physique.</p>
</div>
`},

{id:"mcd-propriete",parent:"mcd",num:"2.1.2",title:"Propriétés",kw:"propriété attribut donnée élémentaire atomique caractéristique",body:`
<div class="kicker">2.1.2 — MCD</div>
<h1>Propriétés</h1>
<p class="lead">Les propriétés sont les informations élémentaires attachées à une entité (ou à une association).</p>

<h2>Définition</h2>
<p>Une <strong>propriété</strong> (ou attribut) est une donnée <em>élémentaire</em> et <em>atomique</em> que l'on souhaite mémoriser : <code>nom</code>, <code>dateAdhesion</code>, <code>titre</code>. Elle prend une valeur pour chaque occurrence.</p>

<h2>Règles de bonne propriété</h2>
<ul>
<li><strong>Atomique</strong> : pas de propriété composée. On évite <code>adresseComplete</code> ; on décompose en <code>rue</code>, <code>codePostal</code>, <code>ville</code> si le métier doit les manipuler séparément.</li>
<li><strong>Non répétitive</strong> : pas de <code>telephone1</code>, <code>telephone2</code>, <code>telephone3</code> — signal qu'il faut une entité <code>TELEPHONE</code> à part.</li>
<li><strong>Non calculée</strong> : l'âge se déduit de la date de naissance, on ne le stocke pas. (On le calculera dans un traitement.)</li>
<li><strong>Mono-valuée</strong> et rattachée à une seule entité — c'est l'enjeu des dépendances fonctionnelles, voir <a href="#mcd-dictionnaire">le dictionnaire des données</a>.</li>
</ul>

<h2>Propriété portée par une association</h2>
<p>Certaines propriétés n'appartiennent ni à l'une ni à l'autre entité, mais au <em>lien</em> entre elles. La <code>dateSortie</code> d'un emprunt ne caractérise ni l'adhérent ni l'exemplaire seuls : elle qualifie leur <strong>rencontre</strong>. Elle se porte donc sur l'association <code>Emprunter</code>. Reconnaître ces propriétés-de-lien est l'un des réflexes essentiels de la modélisation.</p>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p><code>OUVRAGE</code> porte <code>titre</code>, <code>isbn</code>, <code>anneeParution</code>. L'association <code>Emprunter</code> porte <code>dateSortie</code>, <code>dateRetourPrevue</code>, <code>dateRetourEffective</code>. Ce dernier point sera décisif au passage vers le MLD.</p>
</div>
`},

{id:"mcd-identifiant",parent:"mcd",num:"2.1.3",title:"Identifiants",kw:"identifiant clé candidate unique souligné discriminant identité",body:`
<div class="kicker">2.1.3 — MCD</div>
<h1>Identifiants</h1>
<p class="lead">L'identifiant est la propriété (ou le groupe de propriétés) qui distingue sans ambiguïté chaque occurrence d'une entité.</p>

<h2>Définition</h2>
<p>Un <strong>identifiant</strong> garantit l'unicité : deux occurrences différentes ne peuvent partager la même valeur d'identifiant. On le <u>souligne</u> dans le rectangle, en tête de liste. <code><u>numAdherent</u></code> identifie un adhérent.</p>
<p>Toute entité <em>doit</em> posséder un identifiant. S'il n'en émerge pas naturellement, on en crée un artificiel (un numéro séquentiel) — c'est extrêmement fréquent et parfaitement légitime.</p>

<h2>Identifiant naturel vs artificiel</h2>
<table>
<thead><tr><th>Type</th><th>Exemple</th><th>Risque</th></tr></thead>
<tbody>
<tr><td>Naturel</td><td>l'ISBN d'un ouvrage</td><td>Peut changer, être absent (vieux livres), ou être réattribué.</td></tr>
<tr><td>Artificiel (substitut)</td><td><code>numOuvrage</code> auto-incrémenté</td><td>Sans signification métier, mais stable et toujours disponible.</td></tr>
</tbody>
</table>
<p>La pratique moderne privilégie presque toujours un identifiant artificiel stable, l'ISBN devenant alors une propriété ordinaire (éventuellement contrainte « unique »).</p>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p>On retient des identifiants artificiels : <code>numAdherent</code>, <code>numOuvrage</code>, <code>codeCategorie</code>, <code>numAuteur</code>. Le cas de <code>EXEMPLAIRE</code> est particulier — son identité <em>dépend</em> de l'ouvrage : voir <a href="#mcd-faible">la dépendance d'identification</a>.</p>
</div>
`},

{id:"mcd-association",parent:"mcd",num:"2.1.4",title:"Associations",kw:"association relation lien verbe ovale ellipse rôle porteuse",body:`
<div class="kicker">2.1.4 — MCD</div>
<h1>Associations</h1>
<p class="lead">Une association matérialise un lien sémantique entre deux entités (ou plus).</p>

<h2>Définition</h2>
<p>Une <strong>association</strong> (ou relation) relie des entités et porte un nom, le plus souvent un <em>verbe</em> : <code>Emprunter</code>, <code>Ecrire</code>, <code>Appartenir</code>. On la dessine par une ellipse reliée par des pattes aux entités concernées.</p>
<p>Le couple entité-verbe-entité forme une phrase : « un <strong>adhérent</strong> <em>emprunte</em> un <strong>exemplaire</strong> ». Si la phrase n'a pas de sens métier, l'association est suspecte.</p>

<h2>Association porteuse de propriétés</h2>
<p>Une association peut porter ses propres propriétés (les propriétés-de-lien vues précédemment). C'est le signe d'une association qui décrit un <em>fait</em> daté ou quantifié, pas une simple appartenance.</p>

<h2>Le test nom vs verbe</h2>
<p>Un repère utile, qui annonce le pont vers le DDD : si le lien se nomme naturellement par un <strong>verbe</strong> et porte des données, c'est souvent un <em>fait</em> métier qui mériterait peut-être une existence propre. <code>Emprunter</code> + dates ≈ la notion d'« Emprunt », qui deviendra une table à part entière au niveau logique.</p>

<div class="callout fr">
<span class="tag">Fil rouge — les associations</span>
<p><code>Emprunter</code> (Adhérent ↔ Exemplaire, porteuse de dates), <code>Ecrire</code> (Auteur ↔ Ouvrage), <code>Appartenir</code> (Ouvrage ↔ Catégorie), <code>Posséder</code> (Exemplaire ↔ Ouvrage). Chacune va recevoir des cardinalités qui décideront de son sort au niveau logique.</p>
</div>
`},

{id:"mcd-cardinalites",parent:"mcd",num:"2.1.5",title:"Cardinalités",kw:"cardinalité minimale maximale 0 1 n participation obligatoire optionnelle min max couple",body:`
<div class="kicker">2.1.5 — MCD</div>
<h1>Cardinalités</h1>
<p class="lead">Le couple (min, max) sur chaque patte d'une association : la notion la plus dense — et la plus source d'erreurs — du MCD.</p>

<h2>Lecture</h2>
<p>Sur la patte qui relie une entité E à une association A, le couple <code>(min, max)</code> répond à : <em>« une occurrence de E participe à A au minimum… et au maximum… de fois ? »</em></p>
<ul>
<li><strong>min</strong> ∈ {0, 1} — la participation est-elle facultative (0) ou obligatoire (1) ?</li>
<li><strong>max</strong> ∈ {1, n} — une occurrence participe-t-elle au plus une fois (1) ou plusieurs (n) ?</li>
</ul>

<table>
<thead><tr><th>Couple</th><th>Signification</th><th>Exemple médiathèque</th></tr></thead>
<tbody>
<tr><td><code>(0,n)</code></td><td>facultatif, plusieurs</td><td>un adhérent peut n'avoir aucun emprunt, ou plusieurs</td></tr>
<tr><td><code>(1,n)</code></td><td>obligatoire, plusieurs</td><td>un ouvrage est écrit par au moins un auteur</td></tr>
<tr><td><code>(0,1)</code></td><td>facultatif, au plus un</td><td>un exemplaire est, à un instant t, lié à au plus un emprunt en cours</td></tr>
<tr><td><code>(1,1)</code></td><td>obligatoire, exactement un</td><td>un exemplaire appartient à exactement un ouvrage</td></tr>
</tbody>
</table>

<div class="callout warn">
<span class="tag">Le piège du côté de lecture</span>
<p>En MERISE, le couple se lit <strong>du côté de l'entité regardée</strong>. C'est l'inverse d'UML, où la multiplicité se note à l'<em>autre</em> bout du lien. Beaucoup d'erreurs viennent de là quand on jongle entre les deux notations — voir <a href="#uml">MERISE vs UML</a>.</p>
</div>

<figure class="fig">
<svg viewBox="0 0 720 250" role="img" aria-label="Comment lire un couple de cardinalités (min,max)">
  <rect class="s-box" x="34" y="44" width="150" height="52" rx="3"/>
  <text class="s-txt s-bold" x="109" y="75" text-anchor="middle" font-size="13">ADHERENT</text>
  <path class="s-line" d="M 184 70 H 300"/>
  <text class="s-card" x="206" y="62">(0,n)</text>
  <ellipse class="s-assoc" cx="360" cy="70" rx="58" ry="26"/>
  <text class="s-assoct" x="360" y="75" text-anchor="middle" font-size="12">Emprunter</text>
  <path class="s-line" d="M 420 70 H 536"/>
  <text class="s-card" x="470" y="62">(0,n)</text>
  <rect class="s-box" x="536" y="44" width="150" height="52" rx="3"/>
  <text class="s-txt s-bold" x="611" y="75" text-anchor="middle" font-size="13">EXEMPLAIRE</text>
  <text class="s-mut" x="360" y="120" text-anchor="middle" font-size="12">Lecture côté ADHERENT : « un adhérent participe à 0 à n emprunts »</text>
  <line class="s-line-2" x1="34" y1="146" x2="686" y2="146"/>
  <rect class="s-accent" x="34" y="166" width="86" height="30" rx="6"/>
  <text x="77" y="186" text-anchor="middle" style="fill:var(--paper);font-size:12px;font-weight:700">min = 0</text>
  <text class="s-txt" x="132" y="186" font-size="13"><tspan class="s-bold">participation</tspan> — 0 = facultative · 1 = obligatoire</text>
  <rect class="s-blue" x="34" y="206" width="86" height="30" rx="6"/>
  <text x="77" y="226" text-anchor="middle" style="fill:var(--paper);font-size:12px;font-weight:700">max = n</text>
  <text class="s-txt" x="132" y="226" font-size="13"><tspan class="s-bold">multiplicité</tspan> — 1 = au plus un · n = plusieurs</text>
</svg>
<figcaption>Un couple <code>(min,max)</code> se lit du côté de l'entité regardée : le <em>min</em> dit si la participation est obligatoire, le <em>max</em> combien de fois au plus.</figcaption>
</figure>

<h2>Le max décide tout</h2>
<p>Le <strong>maximum</strong> de chaque côté détermine la nature de l'association et donc sa transformation logique :</p>
<ul>
<li>max = <code>1</code> d'un côté et <code>n</code> de l'autre → relation <em>un-à-plusieurs</em> (c'est une <a href="#mcd-cif">CIF</a>) → clé étrangère ;</li>
<li>max = <code>n</code> des deux côtés → relation <em>plusieurs-à-plusieurs</em> → table d'association.</li>
</ul>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p><code>Posséder</code> : côté Exemplaire <code>(1,1)</code>, côté Ouvrage <code>(1,n)</code> → un-à-plusieurs. <code>Ecrire</code> : <code>(1,n)</code> des deux côtés → plusieurs-à-plusieurs. <code>Emprunter</code> : <code>(0,n)</code> des deux côtés → plusieurs-à-plusieurs porteuse de données.</p>
</div>
`},

{id:"mcd-dimensions",parent:"mcd",num:"2.1.6",title:"Dimension des associations",kw:"dimension arité binaire ternaire n-aire réflexive récursive degré patte",body:`
<div class="kicker">2.1.6 — MCD</div>
<h1>Dimension (arité) des associations</h1>
<p class="lead">Le nombre de pattes d'une association — le plus souvent deux, parfois davantage, parfois une entité reliée à elle-même.</p>

<h2>Binaire</h2>
<p>Le cas standard : deux entités. <code>Adherent — Emprunter — Exemplaire</code>.</p>

<h2>Ternaire et n-aire</h2>
<p>Trois entités (ou plus) participent <em>simultanément et indissociablement</em> à un même fait. Exemple typique : un <code>ENSEIGNANT</code> enseigne une <code>MATIERE</code> dans une <code>SALLE</code> — si la combinaison des trois est nécessaire pour donner un sens, l'association est ternaire.</p>
<div class="callout warn">
<span class="tag">Prudence</span>
<p>Les associations ternaires sont souvent un piège : beaucoup se décomposent en plusieurs binaires. On ne garde une ternaire que si <em>aucun</em> sous-ensemble de pattes ne suffit à exprimer la règle. Au niveau logique, une n-aire devient une table dont la clé combine les identifiants de toutes les entités participantes.</p>
</div>

<h2>Réflexive (récursive)</h2>
<p>Une entité reliée à elle-même, via deux <em>rôles</em> distincts. Exemple : <code>EMPLOYE — encadre — EMPLOYE</code> (chef / subordonné). On nomme les rôles pour lever l'ambiguïté.</p>
<div class="diagram">
  <div class="ent"><div class="h">EMPLOYE</div><div class="b"><span class="id">matricule</span><br>nom</div></div>
  <div class="rel"><span class="card-min">0,n</span><div class="line"></div><div class="oval">Encadre</div><div class="line"></div><span class="card-min">0,1</span></div>
  <div style="font-size:12px;color:var(--muted);max-width:120px">rôles : <em>chef</em> (0,n) / <em>subordonné</em> (0,1)</div>
</div>
`},

{id:"mcd-cif",parent:"mcd",num:"2.1.7",title:"La CIF",kw:"cif contrainte intégrité fonctionnelle dépendance fonctionnelle determine un-à-plusieurs",body:`
<div class="kicker">2.1.7 — MCD</div>
<h1>La CIF — Contrainte d'Intégrité Fonctionnelle</h1>
<p class="lead">Une association un-à-plusieurs exprime, en réalité, une dépendance fonctionnelle : connaître l'un détermine l'autre de façon unique.</p>

<h2>Définition</h2>
<p>Une <strong>CIF</strong> existe lorsqu'une occurrence d'une entité en <em>détermine au plus une</em> d'une autre. C'est exactement le cas d'une association dont une patte porte un maximum à <code>1</code>. « À un emprunt en cours correspond <em>un seul</em> exemplaire » : il y a CIF de l'emprunt vers l'exemplaire.</p>
<p>Dit autrement : la CIF est la traduction MERISE d'une <strong>dépendance fonctionnelle</strong> entre entités. Elle ne porte jamais de propriétés (sinon, ce serait un fait à part entière, pas une simple contrainte).</p>

<h2>Pourquoi c'est central</h2>
<p>La CIF est le pivot du passage au relationnel : <strong>toute CIF devient une clé étrangère</strong>, jamais une table. Repérer les CIF, c'est anticiper les colonnes <code>#</code> du futur schéma.</p>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p><code>Appartenir</code> (Ouvrage → Catégorie) : un ouvrage appartient à exactement une catégorie → CIF. Au niveau logique, la table <code>OUVRAGE</code> recevra une clé étrangère <code>#codeCategorie</code>. De même <code>Posséder</code> est une CIF de l'exemplaire vers l'ouvrage.</p>
</div>

<div class="callout note">
<span class="tag">Vocabulaire</span>
<p>Certaines variantes de MERISE notent explicitement la CIF par une flèche ou un symbole dédié plutôt que par une association classique. Le concept reste le même : une dépendance fonctionnelle entre entités.</p>
</div>
`},

{id:"mcd-faible",parent:"mcd",num:"2.1.8",title:"Dépendance d'identification",kw:"entité faible dépendance identification relative identifiant relatif composé exemplaire",body:`
<div class="kicker">2.1.8 — MCD</div>
<h1>Dépendance d'identification (entité faible)</h1>
<p class="lead">Certaines entités ne peuvent être identifiées qu'à travers une autre : leur identité est <em>relative</em>.</p>

<h2>Le principe</h2>
<p>Une entité a une <strong>identification relative</strong> quand son identifiant ne suffit pas seul et n'a de sens qu'au sein d'une entité « propriétaire ». Cas d'école : une <code>LIGNE_COMMANDE</code> numérotée 1, 2, 3 <em>à l'intérieur de</em> chaque commande — le numéro de ligne seul ne dit rien.</p>
<p>On marque la patte de l'association porteuse de cette dépendance (souvent d'un trait particulier selon le formalisme), et l'identifiant de l'entité faible devient <em>composé</em> : son discriminant local + l'identifiant du propriétaire.</p>

<h2>Faut-il un identifiant relatif dans la médiathèque ?</h2>
<p>On <em>pourrait</em> identifier un exemplaire par « ouvrage + numéro local d'exemplaire » (exemplaire n°3 de tel ouvrage). C'est une identification relative parfaitement valable :</p>
<div class="diagram">
  <div class="ent"><div class="h">OUVRAGE</div><div class="b"><span class="id">numOuvrage</span><br>titre</div></div>
  <div class="rel"><span class="card-min">1,n</span><div class="line"></div><div class="oval">Posséder</div><div class="line"></div><span class="card-min">1,1</span></div>
  <div class="ent"><div class="h">EXEMPLAIRE</div><div class="b"><span class="id">noLocal</span> (relatif)<br>etat</div></div>
</div>
<p>En pratique, on tranche souvent pour un identifiant artificiel global (<code>numExemplaire</code>) qui simplifie le modèle logique. Les deux choix sont défendables ; ce qui compte est de comprendre <em>pourquoi</em> l'exemplaire dépend de l'ouvrage.</p>

<div class="callout note">
<span class="tag">Écho moderne</span>
<p>Cette dépendance d'identification préfigure exactement la notion d'<strong>entité interne à un agrégat</strong> en DDD : un objet dont l'identité n'a de sens qu'à l'intérieur de sa racine d'agrégat. Voir <a href="#ddd">MERISE &amp; DDD</a>.</p>
</div>
`},

{id:"mcd-heritage",parent:"mcd",num:"2.1.9",title:"Héritage (spécialisation)",kw:"héritage généralisation spécialisation sous-type sur-type is-a merise2 surtype",body:`
<div class="kicker">2.1.9 — MCD</div>
<h1>Héritage — généralisation / spécialisation</h1>
<p class="lead">Apport de MERISE/2 : modéliser qu'une entité est un cas particulier d'une autre (« est-un »).</p>

<h2>Le concept</h2>
<p>On peut relier un <strong>sur-type</strong> à des <strong>sous-types</strong> qui héritent de ses propriétés tout en ajoutant les leurs. <code>DOCUMENT</code> (générique) se spécialise en <code>LIVRE</code>, <code>CD</code>, <code>DVD</code> : tous ont un titre et une cote, mais le livre a un nombre de pages, le CD une durée.</p>

<h2>Les contraintes de couverture</h2>
<table>
<thead><tr><th>Contrainte</th><th>Sens</th></tr></thead>
<tbody>
<tr><td>Totale</td><td>toute occurrence du sur-type appartient à au moins un sous-type</td></tr>
<tr><td>Partielle</td><td>certaines occurrences ne sont dans aucun sous-type</td></tr>
<tr><td>Exclusive (disjointe)</td><td>une occurrence est dans au plus un sous-type</td></tr>
<tr><td>Non exclusive</td><td>une occurrence peut relever de plusieurs sous-types</td></tr>
</tbody>
</table>

<div class="callout warn">
<span class="tag">Pas natif</span>
<p>MERISE 1 ne connaissait pas l'héritage : on le simulait par des associations <code>(0,1)</code> vers des entités « extension ». UML, lui, l'intègre nativement et plus richement — c'est l'une des différences les plus visibles entre les deux. Au passage au relationnel, l'héritage offre trois stratégies (table unique, table par sous-type, table par classe concrète) détaillées dans le <a href="#mld-regles">passage MCD → MLD</a>.</p>
</div>
`},

{id:"mcd-contraintes",parent:"mcd",num:"2.1.10",title:"Contraintes inter-associations",kw:"contraintes inter-associations partition exclusion inclusion totalité simultanéité CIM symboles",body:`
<div class="kicker">2.1.10 — MCD</div>
<h1>Contraintes inter-associations</h1>
<p class="lead">Quand plusieurs associations sont liées par une règle métier qui ne tient pas dans les seules cardinalités.</p>

<h2>Le besoin</h2>
<p>Les cardinalités décrivent chaque association isolément. Mais le métier impose parfois des règles <em>entre</em> associations : « un adhérent ne peut pas à la fois réserver et emprunter le même exemplaire ». Ces règles se notent par des symboles entre les pattes concernées.</p>

<table>
<thead><tr><th>Contrainte</th><th>Symbole usuel</th><th>Sens</th></tr></thead>
<tbody>
<tr><td>Exclusion</td><td>X</td><td>les deux liens ne peuvent coexister pour une même occurrence</td></tr>
<tr><td>Totalité</td><td>T</td><td>au moins un des liens doit exister</td></tr>
<tr><td>Partition</td><td>+ (ou XT)</td><td>exactement un des liens (exclusion + totalité)</td></tr>
<tr><td>Inclusion</td><td>I (⊂)</td><td>l'existence d'un lien impose l'autre</td></tr>
<tr><td>Égalité / simultanéité</td><td>=</td><td>les liens existent toujours ensemble ou pas du tout</td></tr>
</tbody>
</table>

<div class="callout note">
<span class="tag">Limite</span>
<p>Ces contraintes graphiques ne couvrent jamais toutes les règles de gestion. Les règles complexes (« quota de 5 emprunts ») ne se dessinent pas : elles seront portées par les <a href="#mct">traitements</a> et/ou par des contraintes <code>CHECK</code> et des déclencheurs au niveau <a href="#mpd">physique</a>. C'est précisément pour cela que MERISE modélise aussi les traitements.</p>
</div>
`},

/* ---- MLD ---- */
{id:"mld",parent:"donnees",num:"2.2",title:"Modèle Logique des Données (MLD)",kw:"mld modèle logique données relationnel tables relation schéma",body:`
<div class="kicker">2.2 — Données</div>
<h1>Modèle Logique des Données (MLD)</h1>
<p class="lead">Le MCD traduit dans un modèle de données précis — presque toujours le modèle relationnel. C'est ici qu'apparaissent les tables, les clés primaires et les clés étrangères.</p>
<p>Le MLD reste indépendant d'un SGBD particulier : il décrit <em>des relations</em> (tables) au sens de Codd, pas encore du SQL Oracle ou PostgreSQL. Sa force : on y passe par des <strong>règles quasi mécaniques</strong> depuis le MCD.</p>
<ul>
<li><a href="#mld-relationnel">2.2.1 — Le modèle relationnel</a></li>
<li><a href="#mld-regles">2.2.2 — Règles de passage MCD → MLD</a></li>
<li><a href="#mld-normalisation">2.2.3 — Normalisation (formes normales)</a></li>
</ul>
`},

{id:"mld-relationnel",parent:"mld",num:"2.2.1",title:"Le modèle relationnel",kw:"relationnel relation table tuple attribut domaine clé primaire étrangère codd notation",body:`
<div class="kicker">2.2.1 — MLD</div>
<h1>Le modèle relationnel</h1>
<p class="lead">La cible logique de MERISE : les données organisées en relations (tables) reliées par des clés.</p>

<h2>Vocabulaire</h2>
<table>
<thead><tr><th>Terme relationnel</th><th>Terme courant</th></tr></thead>
<tbody>
<tr><td>Relation</td><td>Table</td></tr>
<tr><td>Tuple</td><td>Ligne / enregistrement</td></tr>
<tr><td>Attribut</td><td>Colonne</td></tr>
<tr><td>Clé primaire</td><td>Identifiant unique de la ligne</td></tr>
<tr><td>Clé étrangère</td><td>Référence vers la clé primaire d'une autre relation</td></tr>
</tbody>
</table>

<h2>Notation MERISE du MLD</h2>
<p>On écrit chaque relation sous forme textuelle : son nom suivi de ses attributs entre parenthèses, la <u>clé primaire soulignée</u> et les <code>#</code> clés étrangères préfixées d'un dièse.</p>
<pre><code>ADHERENT (<span class="tk">numAdherent</span>, nom, prenom, dateAdhesion)
OUVRAGE  (<span class="tk">numOuvrage</span>, titre, isbn, anneeParution, #codeCategorie)</code></pre>
<p class="tc">(numAdherent et numOuvrage soulignés = clés primaires ; #codeCategorie = clé étrangère vers CATEGORIE.)</p>

<div class="callout note">
<span class="tag">Pourquoi le relationnel</span>
<p>MERISE est née en même temps que le triomphe des SGBD relationnels. Le modèle de Codd offre une cible mathématiquement saine (l'algèbre relationnelle) et la normalisation comme garde-fou contre les redondances. C'est pourquoi le MLD <em>est</em> presque toujours relationnel — même si rien n'interdit, en théorie, un MLD réseau ou hiérarchique.</p>
</div>
`},

{id:"mld-regles",parent:"mld",num:"2.2.2",title:"Règles de passage MCD → MLD",kw:"règles passage transformation mcd mld clé étrangère table association héritage entité",body:`
<div class="kicker">2.2.2 — MLD</div>
<h1>Règles de passage MCD → MLD</h1>
<p class="lead">Le moment où MERISE devient mécanique : un petit jeu de règles transforme tout MCD en schéma relationnel.</p>

<h2>Règle 1 — Les entités</h2>
<p>Chaque entité devient une <strong>relation</strong>. Son identifiant devient la <strong>clé primaire</strong>, ses propriétés deviennent des attributs.</p>

<h2>Règle 2 — Les CIF (associations un-à-plusieurs)</h2>
<p>Une association dont une patte est à max <code>1</code> ne crée <em>pas</em> de table. On ajoute une <strong>clé étrangère</strong> dans la relation située du côté <code>(x,1)</code>, pointant vers l'identifiant de l'autre. Les éventuelles propriétés de l'association migrent avec elle.</p>
<pre><code><span class="tc">-- Posséder (Exemplaire 1,1 — Ouvrage 1,n) : CIF</span>
EXEMPLAIRE (<span class="tk">numExemplaire</span>, etat, #numOuvrage)</code></pre>

<h2>Règle 3 — Les associations plusieurs-à-plusieurs</h2>
<p>Une association à max <code>n</code> des deux côtés devient une <strong>relation</strong> à part entière. Sa clé primaire est la <em>concaténation</em> des identifiants des entités reliées (chacun étant aussi clé étrangère). Les propriétés portées deviennent des attributs.</p>
<pre><code><span class="tc">-- Ecrire (Auteur n,n — Ouvrage n,n)</span>
ECRIRE (<span class="tk">#numAuteur</span>, <span class="tk">#numOuvrage</span>)

<span class="tc">-- Emprunter (Adherent 0,n — Exemplaire 0,n), porteuse de dates</span>
EMPRUNT (<span class="tk">#numAdherent</span>, <span class="tk">#numExemplaire</span>, <span class="tk">dateSortie</span>, dateRetourPrevue, dateRetourEffective)</code></pre>
<p class="tc">La date de sortie entre dans la clé : un même adhérent peut réemprunter le même exemplaire à une autre date.</p>

<h2>Règle 4 — Les associations un-à-un</h2>
<p>Max <code>1</code> des deux côtés : on fusionne les deux entités, ou on place une clé étrangère (avec contrainte d'unicité) du côté à participation obligatoire.</p>

<h2>Règle 5 — Les n-aires</h2>
<p>Comme la règle 3, étendue : une table dont la clé combine les identifiants de <em>toutes</em> les entités participantes.</p>

<h2>Règle 6 — L'héritage (3 stratégies)</h2>
<table>
<thead><tr><th>Stratégie</th><th>Principe</th><th>Compromis</th></tr></thead>
<tbody>
<tr><td>Table unique</td><td>une table pour le sur-type, colonnes de tous les sous-types + discriminant</td><td>simple, mais colonnes souvent nulles</td></tr>
<tr><td>Une table par sous-type</td><td>chaque sous-type a sa table, liée au sur-type par clé partagée</td><td>propre, mais jointures fréquentes</td></tr>
<tr><td>Une table par classe concrète</td><td>chaque sous-type duplique les colonnes du sur-type</td><td>pas de jointure, mais redondance du schéma</td></tr>
</tbody>
</table>

<div class="callout fr">
<span class="tag">Fil rouge — le MLD complet</span>
<pre><code>ADHERENT  (<span class="tk">numAdherent</span>, nom, prenom, dateAdhesion)
CATEGORIE (<span class="tk">codeCategorie</span>, libelle)
OUVRAGE   (<span class="tk">numOuvrage</span>, titre, isbn, anneeParution, #codeCategorie)
EXEMPLAIRE(<span class="tk">numExemplaire</span>, etat, #numOuvrage)
AUTEUR    (<span class="tk">numAuteur</span>, nomAuteur, prenomAuteur)
ECRIRE    (<span class="tk">#numAuteur</span>, <span class="tk">#numOuvrage</span>)
EMPRUNT   (<span class="tk">#numAdherent</span>, <span class="tk">#numExemplaire</span>, <span class="tk">dateSortie</span>,
           dateRetourPrevue, dateRetourEffective)</code></pre>
</div>
`},

{id:"mld-normalisation",parent:"mld",num:"2.2.3",title:"Normalisation (formes normales)",kw:"normalisation formes normales 1nf 2nf 3nf bcnf dépendance redondance anomalie codd",body:`
<div class="kicker">2.2.3 — MLD</div>
<h1>Normalisation — les formes normales</h1>
<p class="lead">Le garde-fou contre la redondance : une série de critères qui garantissent qu'une donnée n'est stockée qu'une fois, au bon endroit.</p>

<h2>Pourquoi normaliser</h2>
<p>La redondance crée des <strong>anomalies</strong> : de mise à jour (changer une info à dix endroits), d'insertion (impossible d'ajouter X sans Y), de suppression (perdre Z en effaçant W). Les formes normales éliminent ces risques en s'appuyant sur les <a href="#mcd-dictionnaire">dépendances fonctionnelles</a>.</p>

<h2>Les paliers</h2>
<table>
<thead><tr><th>Forme</th><th>Exige que…</th></tr></thead>
<tbody>
<tr><td><strong>1NF</strong></td><td>tous les attributs sont atomiques ; aucun groupe répétitif.</td></tr>
<tr><td><strong>2NF</strong></td><td>1NF + aucun attribut non-clé ne dépend d'une <em>partie</em> seulement d'une clé composée.</td></tr>
<tr><td><strong>3NF</strong></td><td>2NF + aucun attribut non-clé ne dépend d'un autre attribut non-clé (pas de dépendance transitive).</td></tr>
<tr><td><strong>BCNF</strong></td><td>3NF renforcée : tout déterminant est une clé candidate.</td></tr>
</tbody>
</table>

<h2>Exemple de violation de 3NF</h2>
<pre><code><span class="tc">-- Mauvais : libelle dépend de codeCategorie, pas de numOuvrage</span>
OUVRAGE (<span class="tk">numOuvrage</span>, titre, codeCategorie, libelleCategorie)
         <span class="tc">                       └────── dépendance transitive ──────┘</span>

<span class="tc">-- Bon : on isole CATEGORIE</span>
OUVRAGE   (<span class="tk">numOuvrage</span>, titre, #codeCategorie)
CATEGORIE (<span class="tk">codeCategorie</span>, libelle)</code></pre>

<div class="callout note">
<span class="tag">Bonne nouvelle</span>
<p>Un MCD correctement construit (entités bien découpées, propriétés atomiques, identifiants justes) produit <strong>presque automatiquement</strong> un MLD en 3NF. La normalisation sert surtout de <em>vérification</em> a posteriori, ou de correctif quand on part d'un schéma existant. La dénormalisation volontaire, elle, relève du <a href="#mpd-optim">niveau physique</a>.</p>
</div>
`},

{id:"mpd",parent:"donnees",num:"2.3",title:"Modèle Physique des Données (MPD)",kw:"mpd modèle physique données sql ddl sgbd types index implémentation",body:`
<div class="kicker">2.3 — Données</div>
<h1>Modèle Physique des Données (MPD)</h1>
<p class="lead">Le dernier palier : le MLD coulé dans un SGBD précis, avec ses types, ses contraintes et ses optimisations.</p>
<p>Ici tombent enfin les décisions techniques qu'on a soigneusement repoussées : quel SGBD, quels types de colonnes, quels index, faut-il dénormaliser pour la performance. Le MPD est <em>spécifique</em> à une cible (PostgreSQL, Oracle, MySQL…).</p>
<ul>
<li><a href="#mpd-sql">2.3.1 — Du MLD au DDL SQL</a></li>
<li><a href="#mpd-optim">2.3.2 — Index, dénormalisation, optimisation</a></li>
</ul>
`},

{id:"mpd-sql",parent:"mpd",num:"2.3.1",title:"Du MLD au DDL SQL",kw:"sql ddl create table contrainte clé primaire étrangère foreign key not null check type",body:`
<div class="kicker">2.3.1 — MPD</div>
<h1>Du MLD au DDL SQL</h1>
<p class="lead">La traduction quasi directe du modèle logique en instructions <code>CREATE TABLE</code>.</p>

<h2>Correspondances</h2>
<ul>
<li>relation → <code>CREATE TABLE</code> ;</li>
<li>clé primaire → <code>PRIMARY KEY</code> ;</li>
<li>clé étrangère <code>#</code> → <code>FOREIGN KEY … REFERENCES …</code> ;</li>
<li>identifiant artificiel → colonne auto-incrémentée (<code>GENERATED … AS IDENTITY</code>, <code>SERIAL</code>, <code>AUTO_INCREMENT</code> selon le SGBD) ;</li>
<li>propriétés → colonnes typées, avec <code>NOT NULL</code> quand la cardinalité minimale était à 1.</li>
</ul>

<div class="callout fr">
<span class="tag">Fil rouge — DDL PostgreSQL</span>
<pre><code><span class="tk">CREATE TABLE</span> categorie (
  code_categorie   <span class="tk">SERIAL PRIMARY KEY</span>,
  libelle          <span class="tk">VARCHAR</span>(60) <span class="tk">NOT NULL</span>
);

<span class="tk">CREATE TABLE</span> ouvrage (
  num_ouvrage      <span class="tk">SERIAL PRIMARY KEY</span>,
  titre            <span class="tk">VARCHAR</span>(200) <span class="tk">NOT NULL</span>,
  isbn             <span class="tk">VARCHAR</span>(17) <span class="tk">UNIQUE</span>,
  annee_parution   <span class="tk">SMALLINT</span>,
  code_categorie   <span class="tk">INT NOT NULL REFERENCES</span> categorie
);

<span class="tk">CREATE TABLE</span> exemplaire (
  num_exemplaire   <span class="tk">SERIAL PRIMARY KEY</span>,
  etat             <span class="tk">VARCHAR</span>(20) <span class="tk">DEFAULT</span> 'bon',
  num_ouvrage      <span class="tk">INT NOT NULL REFERENCES</span> ouvrage
);

<span class="tk">CREATE TABLE</span> emprunt (
  num_adherent       <span class="tk">INT REFERENCES</span> adherent,
  num_exemplaire     <span class="tk">INT REFERENCES</span> exemplaire,
  date_sortie        <span class="tk">DATE NOT NULL</span>,
  date_retour_prevue <span class="tk">DATE NOT NULL</span>,
  date_retour_effective <span class="tk">DATE</span>,
  <span class="tk">PRIMARY KEY</span> (num_adherent, num_exemplaire, date_sortie)
);</code></pre>
</div>

<div class="callout note">
<span class="tag">Les règles qui ne se dessinaient pas</span>
<p>Le quota de 5 emprunts (RG6) n'a aucune place dans le schéma de tables. Il se code soit dans un <a href="#mct">traitement</a> applicatif, soit par une contrainte avancée (déclencheur / trigger). C'est l'illustration parfaite de la frontière entre données et traitements.</p>
</div>
`},

{id:"mpd-optim",parent:"mpd",num:"2.3.2",title:"Index, dénormalisation, optimisation",kw:"index dénormalisation optimisation performance partitionnement vue matérialisée physique",body:`
<div class="kicker">2.3.2 — MPD</div>
<h1>Index, dénormalisation, optimisation</h1>
<p class="lead">Les arbitrages de performance — les seuls endroits où l'on accepte, en connaissance de cause, de s'écarter de la pureté logique.</p>

<h2>Index</h2>
<p>On crée des index sur les colonnes fréquemment filtrées ou jointes — typiquement les clés étrangères et les colonnes de recherche. Un index sur <code>emprunt(date_retour_effective)</code> accélère la requête « emprunts non rendus en retard ». Le coût : l'espace disque et le ralentissement des écritures.</p>

<h2>Dénormalisation</h2>
<p>On peut <strong>volontairement</strong> réintroduire une redondance pour éviter des jointures coûteuses : stocker un <code>nb_exemplaires_disponibles</code> sur l'ouvrage plutôt que de le recompter à chaque affichage. C'est un choix <em>physique</em>, jamais conceptuel — et il faut alors maintenir la cohérence par des traitements ou des déclencheurs.</p>

<div class="callout warn">
<span class="tag">Discipline MERISE</span>
<p>La dénormalisation se décide <strong>au niveau physique uniquement</strong>, et toujours après mesure. Dénormaliser « par anticipation » dans le MCD ou le MLD, c'est trahir la séparation des niveaux : on mélange un problème de performance (physique) avec un problème de sens (conceptuel).</p>
</div>

<h2>Autres leviers physiques</h2>
<ul>
<li>partitionnement des grandes tables (par année d'emprunt, par exemple) ;</li>
<li>vues matérialisées pour les statistiques ;</li>
<li>choix fins de types et de tailles (impact stockage et cache).</li>
</ul>
`},

{id:"traitements",parent:null,num:"3",title:"Axe des Traitements",kw:"traitements dynamique mct mot mopt processus comportement",body:`
<div class="kicker">Partie 3 — Traitements (dynamique)</div>
<h1>L'axe des Traitements</h1>
<p class="lead">La face souvent négligée de MERISE — et pourtant la moitié de la méthode : modéliser ce que le système <em>fait</em> en réaction aux événements.</p>
<p>Là où l'axe Données décrit la mémoire, l'axe Traitements décrit le comportement. Il suit la même descente d'abstraction : le <em>quoi</em> (MCT), puis le <em>qui/où/quand</em> (MOT), enfin le <em>comment</em> (MOpT).</p>
<table>
<thead><tr><th>Modèle</th><th>Niveau</th><th>Répond à</th></tr></thead>
<tbody>
<tr><td><a href="#mct">MCT</a></td><td>Conceptuel</td><td>Quelles règles métier, déclenchées par quels événements ?</td></tr>
<tr><td><a href="#mot">MOT</a></td><td>Organisationnel</td><td>Qui exécute, à quel poste, manuellement ou non, quand ?</td></tr>
<tr><td><a href="#mopt">MOpT</a></td><td>Opérationnel</td><td>Quels programmes, transactions, écrans ?</td></tr>
</tbody>
</table>
`},

/* ---- MCT ---- */
{id:"mct",parent:"traitements",num:"3.1",title:"Modèle Conceptuel des Traitements (MCT)",kw:"mct modèle conceptuel traitements événement opération synchronisation règle émission résultat",body:`
<div class="kicker">3.1 — Traitements</div>
<h1>Modèle Conceptuel des Traitements (MCT)</h1>
<p class="lead">Décrire les règles métier comme un enchaînement d'événements et d'opérations, sans rien dire de qui les exécute ni comment.</p>

<h2>Le principe</h2>
<p>Le MCT ne s'intéresse qu'à la <strong>logique métier pure</strong> : quels stimuli (événements) déclenchent quelles réactions (opérations), et quels nouveaux événements en résultent. Pas d'écran, pas d'acteur, pas d'horaire — tout cela est repoussé au <a href="#mot">MOT</a>.</p>

<div class="diagram" style="flex-direction:column;gap:0;align-items:center">
  <div class="tag-pill">Événement : « Demande d'emprunt »</div>
  <div style="font-size:18px;color:var(--muted)">↓</div>
  <div class="ent" style="min-width:220px"><div class="h">OPÉRATION — Enregistrer l'emprunt</div><div class="b" style="font-family:inherit;text-align:left">vérifier validité adhésion<br>vérifier quota &lt; 5<br>vérifier disponibilité exemplaire</div></div>
  <div style="font-size:13px;color:var(--muted);margin-top:8px">règles d'émission ↓</div>
  <div style="display:flex;gap:14px;margin-top:4px"><span class="tag-pill">Emprunt accepté</span><span class="tag-pill">Emprunt refusé</span></div>
</div>

<h2>Les concepts</h2>
<ul>
<li><a href="#mct-evenement">3.1.1 — Événements</a></li>
<li><a href="#mct-operation">3.1.2 — Opérations</a></li>
<li><a href="#mct-synchro">3.1.3 — Synchronisation</a></li>
<li><a href="#mct-emission">3.1.4 — Règles d'émission &amp; résultats</a></li>
</ul>
`},

{id:"mct-evenement",parent:"mct",num:"3.1.1",title:"Événements",kw:"événement externe interne temporel déclencheur stimulus message flux",body:`
<div class="kicker">3.1.1 — MCT</div>
<h1>Événements</h1>
<p class="lead">Un événement est un fait qui sollicite le système et déclenche, peut-être, une réaction.</p>

<h2>Typologie</h2>
<table>
<thead><tr><th>Type</th><th>Origine</th><th>Exemple</th></tr></thead>
<tbody>
<tr><td>Externe</td><td>vient de l'extérieur du domaine</td><td>un adhérent présente un livre à emprunter</td></tr>
<tr><td>Interne (résultat)</td><td>produit par une opération précédente</td><td>« emprunt accepté » déclenche l'édition du ticket</td></tr>
<tr><td>Temporel</td><td>l'écoulement du temps</td><td>chaque nuit, détecter les retards</td></tr>
</tbody>
</table>
<p>Un événement transporte souvent des <strong>données</strong> (les informations de la demande d'emprunt) — c'est le lien avec l'axe Données et avec le modèle de <a href="#mcc">communication</a>.</p>

<div class="callout fr">
<span class="tag">Fil rouge</span>
<p>Événements de la médiathèque : « demande d'emprunt » (externe), « demande de retour » (externe), « fin de journée » (temporel, pour la détection des retards), « emprunt accepté/refusé » (internes, résultats d'opération).</p>
</div>
`},

{id:"mct-operation",parent:"mct",num:"3.1.2",title:"Opérations",kw:"opération action règle gestion ininterrompue traitement unité",body:`
<div class="kicker">3.1.2 — MCT</div>
<h1>Opérations</h1>
<p class="lead">Une opération est un ensemble d'actions exécutées d'un seul tenant, déclenché par un (ou des) événement(s).</p>

<h2>Caractéristiques</h2>
<ul>
<li><strong>Ininterrompue</strong> : une fois déclenchée, l'opération va à son terme sans attendre de nouvel événement externe. Si elle doit attendre, c'est qu'il faut la scinder en deux opérations.</li>
<li><strong>Porteuse des règles de gestion</strong> : c'est ici que vivent les vérifications (« quota &lt; 5 ») que le schéma de données ne pouvait pas exprimer.</li>
<li><strong>Productrice de résultats</strong> : elle émet un ou plusieurs événements-résultats selon des <a href="#mct-emission">règles d'émission</a>.</li>
</ul>

<div class="callout fr">
<span class="tag">Fil rouge — opération « Enregistrer l'emprunt »</span>
<p>Déclenchée par « demande d'emprunt ». Actions : vérifier que l'adhésion est valide, que l'adhérent a moins de 5 emprunts en cours, que l'exemplaire est disponible ; si tout est bon, créer l'emprunt et marquer l'exemplaire sorti. Résultats possibles : « emprunt accepté » ou « emprunt refusé ».</p>
</div>
`},

{id:"mct-synchro",parent:"mct",num:"3.1.3",title:"Synchronisation",kw:"synchronisation condition et ou booléenne attente plusieurs événements déclenchement",body:`
<div class="kicker">3.1.3 — MCT</div>
<h1>Synchronisation</h1>
<p class="lead">La condition logique qui décide quand une opération attendant plusieurs événements peut effectivement démarrer.</p>

<h2>Le principe</h2>
<p>Quand une opération dépend de <em>plusieurs</em> événements, on note une <strong>synchronisation</strong> : une expression booléenne (<code>ET</code>, <code>OU</code>) sur la présence des événements attendus. L'opération ne se déclenche que si la condition est vraie.</p>
<p>Exemple hors médiathèque, classique : valider une commande nécessite « commande saisie » <code>ET</code> « paiement reçu ». Tant que les deux ne sont pas là, l'opération « expédier » reste en attente.</p>

<div class="callout note">
<span class="tag">À quoi ça sert</span>
<p>La synchronisation rend explicites les <em>points de rendez-vous</em> du processus : les moments où plusieurs fils d'événements doivent converger. C'est l'équivalent conceptuel d'un « join » dans un diagramme d'activité UML.</p>
</div>
`},

{id:"mct-emission",parent:"mct",num:"3.1.4",title:"Règles d'émission & résultats",kw:"règle émission résultat condition sortie événement produit branche alternative",body:`
<div class="kicker">3.1.4 — MCT</div>
<h1>Règles d'émission &amp; résultats</h1>
<p class="lead">À la sortie d'une opération, des conditions déterminent quels événements-résultats sont effectivement émis.</p>

<h2>Le principe</h2>
<p>Une opération peut produire plusieurs <strong>résultats</strong> selon ce qui s'est passé. Une <strong>règle d'émission</strong> est la condition attachée à chaque résultat. C'est l'équivalent conceptuel d'un branchement.</p>
<pre><code><span class="tc">Opération « Enregistrer l'emprunt »</span>
  <span class="tk">SI</span> adhésion valide <span class="tk">ET</span> quota &lt; 5 <span class="tk">ET</span> exemplaire dispo
     <span class="tk">ALORS</span> émettre « Emprunt accepté »
  <span class="tk">SINON</span>
     émettre « Emprunt refusé » (avec motif)</code></pre>
<p>Un résultat <em>interne</em> peut redevenir l'événement déclencheur d'une autre opération (ex. « Emprunt accepté » → opération « Éditer le ticket »), tissant ainsi l'enchaînement complet du MCT.</p>

<div class="callout note">
<span class="tag">Bilan du MCT</span>
<p>Avec ces quatre briques — événements, opérations, synchronisations, règles d'émission — on décrit la totalité de la logique métier <em>sans</em> jamais parler d'organisation. Le <a href="#mot">MOT</a> va maintenant l'incarner dans le réel de l'entreprise.</p>
</div>
`},

/* ---- MOT ---- */
{id:"mot",parent:"traitements",num:"3.2",title:"Modèle Organisationnel des Traitements (MOT)",kw:"mot modèle organisationnel traitements tâche poste acteur manuel automatique interactif procédure temps",body:`
<div class="kicker">3.2 — Traitements</div>
<h1>Modèle Organisationnel des Traitements (MOT)</h1>
<p class="lead">On habille la logique métier d'une organisation : qui fait quoi, à quel poste, manuellement ou par la machine, et quand.</p>

<h2>Les nouvelles questions</h2>
<p>Le MCT répondait au <em>quoi</em>. Le MOT ajoute le <strong>qui, où, quand et comment (au sens organisationnel)</strong>. Une opération conceptuelle se découpe alors en <strong>tâches</strong>, réparties entre acteurs et automatisme.</p>

<h2>Les attributs d'une tâche</h2>
<table>
<thead><tr><th>Dimension</th><th>Valeurs typiques</th></tr></thead>
<tbody>
<tr><td>Poste de travail / acteur</td><td>Accueil, Bibliothécaire, Système</td></tr>
<tr><td>Nature</td><td>manuelle · automatisée · interactive (conversationnelle)</td></tr>
<tr><td>Temporalité</td><td>temps réel · différé (batch)</td></tr>
</tbody>
</table>

<h2>Le tableau de répartition</h2>
<div class="callout fr">
<span class="tag">Fil rouge — opération « Enregistrer l'emprunt » organisée</span>
<table>
<thead><tr><th>Tâche</th><th>Poste</th><th>Nature</th><th>Temps</th></tr></thead>
<tbody>
<tr><td>Scanner la carte et l'exemplaire</td><td>Accueil</td><td>interactive</td><td>temps réel</td></tr>
<tr><td>Contrôler validité, quota, disponibilité</td><td>Système</td><td>automatisée</td><td>temps réel</td></tr>
<tr><td>Enregistrer l'emprunt / afficher le refus</td><td>Système</td><td>automatisée</td><td>temps réel</td></tr>
<tr><td>Remettre le document &amp; le ticket</td><td>Bibliothécaire</td><td>manuelle</td><td>temps réel</td></tr>
<tr><td>Détecter les retards</td><td>Système</td><td>automatisée</td><td>différé (nuit)</td></tr>
</tbody>
</table>
</div>

<div class="callout note">
<span class="tag">Décision clé</span>
<p>C'est au MOT que se tranche la frontière <strong>homme / machine</strong> : ce qui sera automatisé deviendra logiciel (le futur MOpT), ce qui reste manuel devient procédure humaine. Une même logique conceptuelle peut donner des MOT très différents selon le degré d'automatisation choisi.</p>
</div>
`},

/* ---- MOpT ---- */
{id:"mopt",parent:"traitements",num:"3.3",title:"Modèle Opérationnel des Traitements (MOpT)",kw:"mopt mpt modèle opérationnel physique traitements programme transaction écran procédure fonctionnelle",body:`
<div class="kicker">3.3 — Traitements</div>
<h1>Modèle Opérationnel des Traitements (MOpT)</h1>
<p class="lead">Le dernier palier des traitements : les tâches automatisées deviennent des unités logicielles concrètes.</p>

<h2>Le contenu</h2>
<p>Le MOpT (parfois noté MPT, modèle physique des traitements) décrit l'<strong>implémentation</strong> : programmes, transactions, procédures stockées, enchaînement des écrans, appels de services. C'est le pendant « traitements » du <a href="#mpd">MPD</a> côté données.</p>

<h2>Ce qu'on y décide</h2>
<ul>
<li>le découpage en modules / fonctions / endpoints ;</li>
<li>les transactions et leur portée (cohérence, rollback) ;</li>
<li>l'enchaînement des interfaces utilisateur (le « dialogue ») ;</li>
<li>la répartition entre client, serveur, batch.</li>
</ul>

<div class="callout note">
<span class="tag">Lecture moderne</span>
<p>Dans une application contemporaine, le MOpT correspond grosso modo à la couche service / cas d'usage : par exemple une route <code>POST /emprunts</code> qui orchestre les vérifications du MCT, écrit dans les tables du MPD, et renvoie accepté/refusé. MERISE distinguait nettement ce niveau ; les frameworks d'aujourd'hui le mêlent souvent au reste — d'où l'intérêt de garder en tête la séparation des niveaux.</p>
</div>
`},

{id:"mcc",parent:"communication",num:"4.1",title:"Le MCC (diagramme des flux)",kw:"mcc modèle conceptuel communication flux diagramme contexte acteur interne externe domaine périmètre",body:`
<div class="kicker">4.1 — Communication</div>
<h1>Le MCC — Modèle Conceptuel de la Communication</h1>
<p class="lead">Une vue d'ensemble : les acteurs et les flux d'information qui circulent entre eux, avant même de modéliser données et traitements en détail.</p>

<h2>Le principe</h2>
<p>Le MCC (ou diagramme des flux, ou diagramme de contexte) recense les <strong>acteurs</strong> — internes au domaine ou externes — et les <strong>flux</strong> (messages, documents, informations) qu'ils s'échangent. Il fixe le <em>périmètre</em> de l'étude : ce qui est dans le domaine, ce qui est en dehors.</p>

<div class="diagram" style="gap:18px">
  <div class="ent" style="min-width:110px"><div class="h">ADHÉRENT</div><div class="b" style="font-family:inherit">acteur externe</div></div>
  <div class="rel"><span class="card-min">demande d'emprunt →</span><div class="line" style="width:80px"></div><span class="card-min">← ticket / refus</span></div>
  <div class="ent" style="min-width:130px"><div class="h">MÉDIATHÈQUE</div><div class="b" style="font-family:inherit">domaine étudié</div></div>
</div>
<p style="text-align:center;color:var(--muted);font-size:13px;margin-top:-8px">Flux entre un acteur externe et le domaine.</p>

<h2>Pourquoi commencer par là</h2>
<ul>
<li>il <strong>cadre le périmètre</strong> et évite de modéliser des choses hors sujet ;</li>
<li>chaque flux entrant est un futur <a href="#mct-evenement">événement</a> du MCT ;</li>
<li>chaque flux porte des données qui alimenteront le <a href="#mcd">MCD</a>.</li>
</ul>

<div class="callout note">
<span class="tag">Le pont entre les axes</span>
<p>Le MCC est le liant : ses flux deviennent les événements des traitements et les données du modèle de données. C'est souvent par lui que démarre concrètement une étude MERISE, avant de plonger dans le MCD et le MCT.</p>
</div>
`},

{id:"validation",parent:"demarche",num:"5.1",title:"Cohérence données ↔ traitements",kw:"cohérence validation croisée données traitements vérification quantification accès complétude",body:`
<div class="kicker">5.1 — Démarche</div>
<h1>Cohérence données ↔ traitements</h1>
<p class="lead">Les deux axes ne vivent pas séparément : ils doivent se valider mutuellement à chaque niveau.</p>

<h2>Le contrôle de complétude</h2>
<p>La question fondamentale : <em>« toute donnée du MCD est-elle créée, lue, modifiée ou supprimée par au moins un traitement, et tout traitement trouve-t-il les données dont il a besoin ? »</em></p>
<ul>
<li>une entité que <strong>aucun</strong> traitement ne manipule est suspecte (donnée morte) ;</li>
<li>un traitement qui réclame une donnée <strong>absente</strong> du MCD révèle un trou dans le modèle de données.</li>
</ul>

<div class="callout fr">
<span class="tag">Fil rouge — contrôle croisé</span>
<p>L'opération « Enregistrer l'emprunt » lit <code>ADHERENT</code> (validité), compte les <code>EMPRUNT</code> en cours (quota), lit <code>EXEMPLAIRE</code> (disponibilité) et crée un <code>EMPRUNT</code>. Toutes ces entités existent au MCD : le modèle de données est <em>suffisant</em> pour ce traitement. Inversement, l'entité <code>AUTEUR</code> n'est lue par aucun traitement de prêt — ce qui est normal, elle sert à la recherche au catalogue, un autre processus.</p>
</div>

<div class="callout note">
<span class="tag">Outil classique</span>
<p>On formalise ce contrôle par une <strong>matrice CRUD</strong> (entités en lignes, traitements en colonnes, marquant Create/Read/Update/Delete). Une ligne vide ou une colonne incohérente saute aux yeux.</p>
</div>
`},

{id:"cycle-vie",parent:"demarche",num:"5.2",title:"Le déroulement d'un projet",kw:"cycle vie projet schéma directeur étude préalable détaillée réalisation maintenance livrables",body:`
<div class="kicker">5.2 — Démarche</div>
<h1>Le déroulement d'un projet MERISE</h1>
<p class="lead">Quels modèles produit-on, et dans quel ordre, du cadrage stratégique à la maintenance.</p>

<h2>Enchaînement type</h2>
<table>
<thead><tr><th>Étape</th><th>Livrables MERISE</th></tr></thead>
<tbody>
<tr><td>Schéma directeur</td><td>découpage en domaines, priorités</td></tr>
<tr><td>Étude préalable</td><td>MCC, premiers MCD/MCT, scénarios d'organisation</td></tr>
<tr><td>Étude détaillée</td><td>MCD/MCT validés, MOT, maquettes, contrôle de cohérence</td></tr>
<tr><td>Étude technique</td><td>MLD → MPD, MOpT, architecture</td></tr>
<tr><td>Réalisation</td><td>code, tests, jeux d'essai</td></tr>
<tr><td>Mise en œuvre</td><td>reprise de données, formation, bascule</td></tr>
<tr><td>Maintenance</td><td>évolutions, retour aux modèles concernés</td></tr>
</tbody>
</table>

<div class="callout warn">
<span class="tag">Lecture critique</span>
<p>Ce déroulement est foncièrement <strong>séquentiel</strong> (proche du cycle en V) : conçu pour de grands systèmes de gestion stables, il s'accommode mal de l'itératif agile. C'est l'une des raisons du recul de MERISE comme <em>démarche projet</em>, alors même que ses <em>formalismes</em> (surtout le MCD) restent très utilisés. Voir <a href="#aujourdhui">La place de MERISE aujourd'hui</a>.</p>
</div>
`},

{id:"merise2",parent:"demarche",num:"5.3",title:"MERISE/2",kw:"merise2 merise/2 deuxième génération héritage contraintes objet extension années 90",body:`
<div class="kicker">5.3 — Démarche</div>
<h1>MERISE/2</h1>
<p class="lead">Une seconde génération, dans les années 1990, qui enrichit le formalisme face à la montée de l'objet.</p>

<h2>Les apports</h2>
<ul>
<li><strong>Héritage</strong> (généralisation / spécialisation) intégré au MCD — voir <a href="#mcd-heritage">la page dédiée</a> ;</li>
<li>un appareillage plus riche de <strong>contraintes</strong> inter-entités et inter-associations ;</li>
<li>une attention accrue aux <strong>cycles de vie des objets</strong> (états et transitions), rapprochant MERISE des idées objet ;</li>
<li>un meilleur outillage CASE (génération de code et de schémas).</li>
</ul>

<div class="callout note">
<span class="tag">Contexte</span>
<p>MERISE/2 répond à la concurrence des méthodes objet (OMT, Booch) qui convergeront vers UML en 1997. Dans les faits, beaucoup d'organisations passeront directement de MERISE 1 à UML, sans transiter par MERISE/2 — ce qui explique que le MCD « classique » reste la version la plus enseignée.</p>
</div>
`},

{id:"uml",parent:"ponts",num:"6.1",title:"MERISE vs UML",kw:"uml diagramme classes multiplicité cardinalité activité séquence état objet comparaison méthode notation",body:`
<div class="kicker">6.1 — Ponts modernes</div>
<h1>MERISE vs UML</h1>
<p class="lead">Deux visions du monde : MERISE sépare données et traitements ; UML les réunit dans des objets. Comprendre la traduction évite bien des confusions.</p>

<h2>Correspondance des modèles</h2>
<table>
<thead><tr><th>MERISE</th><th>UML (équivalent approché)</th></tr></thead>
<tbody>
<tr><td>MCD</td><td>Diagramme de classes (sans les méthodes)</td></tr>
<tr><td>MCT / MOT</td><td>Diagrammes d'activité, de séquence, d'états</td></tr>
<tr><td>MCC (flux)</td><td>Diagramme de cas d'utilisation / de contexte</td></tr>
<tr><td>Cycle de vie d'un objet</td><td>Diagramme d'états-transitions</td></tr>
</tbody>
</table>

<h2>Le piège des cardinalités</h2>
<div class="callout warn">
<span class="tag">Sens de lecture inversé</span>
<p>En MERISE, le couple <code>(min,max)</code> est placé <strong>du côté de l'entité décrite</strong> et la décrit. En UML, la multiplicité est placée à <strong>l'autre extrémité</strong> de l'association. Conséquence : un « un-à-plusieurs » a ses chiffres aux endroits opposés selon la notation. Erreur classique quand on convertit un schéma de l'une vers l'autre.</p>
</div>

<h2>La différence de fond</h2>
<p>UML est <strong>orienté objet</strong> : une classe encapsule des attributs <em>et</em> des opérations. MERISE pose l'inverse — les données d'un côté, les traitements de l'autre. Le MCD est donc plus proche d'un <em>schéma de persistance</em> que d'un véritable modèle de domaine comportemental. UML offre aussi nativement l'héritage, l'agrégation et la composition, que MERISE 1 ne connaît pas.</p>
`},

{id:"er-chen",parent:"ponts",num:"6.2",title:"MERISE vs Entité-Association (Chen)",kw:"chen entité association entity relationship er barker crow foot notation cardinalité diamant",body:`
<div class="kicker">6.2 — Ponts modernes</div>
<h1>MERISE vs Entité-Association (Chen, Barker…)</h1>
<p class="lead">MERISE est une variante du modèle entité-association de Chen ; les notations anglo-saxonnes ont évolué différemment.</p>

<h2>Trois familles de notation</h2>
<table>
<thead><tr><th>Notation</th><th>Cardinalités</th><th>Particularité</th></tr></thead>
<tbody>
<tr><td>MERISE</td><td>couple <code>(min,max)</code> côté entité</td><td>associations en ellipses ; min explicite</td></tr>
<tr><td>Chen (1976)</td><td>un cardinal (1 / N) côté opposé</td><td>relations en losanges (diamants)</td></tr>
<tr><td>Crow's Foot / Barker</td><td>symboles « patte d'oie »</td><td>dominante dans les outils anglo-saxons et SQL</td></tr>
</tbody>
</table>

<h2>Ce que MERISE apporte de plus</h2>
<p>Le <strong>minimum</strong> de la cardinalité MERISE encode la participation obligatoire/facultative — une information que la notation de Chen exprime moins directement. En contrepartie, la « patte d'oie » est plus compacte et s'est imposée dans les outils de modélisation de bases de données du marché.</p>

<div class="callout note">
<span class="tag">En pratique</span>
<p>Les concepts sont équivalents : entités, associations, attributs, cardinalités. Savoir lire les trois notations permet de naviguer entre un cours français (MERISE), un manuel universitaire (Chen) et un outil comme un modeleur SQL (Crow's Foot) sans se tromper sur le sens des chiffres.</p>
</div>
`},

{id:"sql-orm",parent:"ponts",num:"6.3",title:"Du MLD au SQL et à l'ORM",kw:"sql orm prisma sqlalchemy jpa entity mapping migration schéma persistence drizzle typescript",body:`
<div class="kicker">6.3 — Ponts modernes</div>
<h1>Du MLD au SQL et à l'ORM</h1>
<p class="lead">Le MLD relationnel se prolonge directement dans les outils de persistance contemporains.</p>

<h2>Une chaîne continue</h2>
<p>MCD → MLD → MPD → schéma SQL → <strong>entités d'ORM</strong>. Un ORM (Prisma, SQLAlchemy, JPA/Hibernate, Drizzle…) projette les tables du MLD en objets/classes du langage. Les relations un-à-plusieurs deviennent des références ; les plusieurs-à-plusieurs, des collections via table de jointure — exactement les règles de passage du MLD.</p>

<pre><code><span class="tc">// Schéma Prisma dérivé du MLD de la médiathèque</span>
<span class="tk">model</span> Ouvrage {
  numOuvrage   Int        <span class="tk">@id @default</span>(autoincrement())
  titre        String
  categorie    Categorie  <span class="tk">@relation</span>(fields: [codeCategorie], references: [codeCategorie])
  codeCategorie Int
  exemplaires  Exemplaire[]
}</code></pre>

<div class="callout note">
<span class="tag">L'écart à connaître</span>
<p>Un ORM tend à présenter les relations « à l'envers » d'un MCD pur (orienté navigation objet), et brouille la frontière données/traitements en mettant de la logique dans les modèles. La <strong>discipline MERISE</strong> reste utile en amont : concevoir d'abord un MCD/MLD propre, puis le mapper, donne presque toujours un schéma plus sain que de laisser l'ORM dicter la structure. La normalisation, elle, ne se délègue pas à l'outil.</p>
</div>
`},

{id:"ddd",parent:"ponts",num:"6.4",title:"MERISE & Domain-Driven Design",kw:"ddd domain driven design agrégat entité value object bounded context ubiquitous language anemic invariant racine",body:`
<div class="kicker">6.4 — Ponts modernes</div>
<h1>MERISE &amp; Domain-Driven Design</h1>
<p class="lead">Deux manières opposées de modéliser le domaine — et c'est précisément en les opposant qu'on comprend le mieux chacune.</p>

<h2>La divergence fondatrice</h2>
<p>MERISE <strong>sépare</strong> données et traitements. Le DDD fait l'inverse : il <strong>encapsule</strong> données et comportement dans les mêmes objets du domaine, porteurs de leurs invariants. Un MCD « pur » mène naturellement à ce que le DDD appelle un <em>modèle anémique</em> — des structures de données sans comportement, la logique vivant ailleurs (dans les traitements MERISE).</p>

<h2>Correspondances de concepts</h2>
<table>
<thead><tr><th>MERISE</th><th>DDD</th><th>Nuance</th></tr></thead>
<tbody>
<tr><td>Entité (avec identifiant)</td><td>Entity</td><td>même idée d'identité durable</td></tr>
<tr><td>Propriété / objet sans identité propre</td><td>Value Object</td><td>le DDD en fait un concept de premier plan</td></tr>
<tr><td><a href="#mcd-faible">Dépendance d'identification</a></td><td>Entité interne à un agrégat</td><td>identité relative à une racine</td></tr>
<tr><td>CIF / contraintes</td><td>Invariants d'agrégat</td><td>DDD : la racine garantit la cohérence</td></tr>
<tr><td>Dictionnaire des données</td><td>Ubiquitous Language</td><td>vocabulaire partagé métier/technique</td></tr>
<tr><td>Le MCD unique de l'entreprise</td><td>Bounded Context (pluriel)</td><td><strong>différence majeure</strong></td></tr>
</tbody>
</table>

<div class="callout warn">
<span class="tag">Le point qui compte le plus</span>
<p>MERISE vise un <strong>schéma conceptuel unique</strong> et cohérent pour tout le domaine de l'entreprise. Le DDD soutient l'inverse : plusieurs <strong>bounded contexts</strong>, chacun avec son propre modèle, le même mot pouvant désigner des choses différentes selon le contexte (un « adhérent » au prêt n'est pas le même objet qu'au module de cotisations). C'est l'opposition entre <em>modèle d'entreprise intégré</em> et <em>modèles bornés fédérés</em> — au cœur des débats d'architecture actuels (monolithe modulaire, microservices).</p>
</div>

<div class="callout note">
<span class="tag">Ce qui reste précieux</span>
<p>Le réflexe MERISE — distinguer une donnée stable d'un traitement volatil, repérer les dépendances fonctionnelles, normaliser — garde toute sa valeur pour concevoir la <em>persistance</em> derrière un modèle DDD. Les deux approches ne s'excluent pas : on peut concevoir un domaine riche en DDD <em>et</em> projeter sa persistance sur un schéma relationnel sain pensé à la MERISE.</p>
</div>
`},

{id:"aujourdhui",parent:"ponts",num:"6.5",title:"La place de MERISE aujourd'hui",kw:"aujourd'hui actualité pertinence héritage enseignement france bts iut nosql agile pédagogie",body:`
<div class="kicker">6.5 — Ponts modernes</div>
<h1>La place de MERISE aujourd'hui</h1>
<p class="lead">Méthode datée comme démarche projet, mais formalisme étonnamment vivace — surtout pour qui conçoit des bases relationnelles.</p>

<h2>Ce qui a vieilli</h2>
<ul>
<li>la <strong>démarche séquentielle</strong> (proche du cycle en V) cadre mal avec l'agilité et l'itératif ;</li>
<li>l'<strong>orientation objet</strong> et UML ont absorbé une partie de son terrain à l'international ;</li>
<li>les modèles <strong>NoSQL</strong> et l'architecture <strong>orientée événements</strong> s'accommodent mal d'un schéma relationnel normalisé unique.</li>
</ul>

<h2>Ce qui reste vivant</h2>
<ul>
<li>le <strong>MCD</strong> demeure l'un des meilleurs outils pédagogiques pour apprendre à modéliser, et un excellent support de dialogue métier ;</li>
<li>les <strong>règles de passage</strong> MCD → relationnel → SQL sont toujours exactes et utilisées quotidiennement ;</li>
<li>la <strong>normalisation</strong> est un acquis intemporel de la conception de bases ;</li>
<li>en France, MERISE structure encore l'enseignement (BTS SIO, BUT informatique, titres professionnels comme le CDA).</li>
</ul>

<div class="callout note">
<span class="tag">Conclusion</span>
<p>On gagne à voir MERISE non comme une méthode à appliquer telle quelle, mais comme une <strong>école de la rigueur conceptuelle</strong> : séparer le sens de la technique, repousser les décisions d'implémentation, valider chaque niveau. Ces réflexes survivent à la méthode et nourrissent directement les pratiques d'architecture modernes — du MLD relationnel jusqu'aux frontières des bounded contexts.</p>
</div>
`},

{id:"glossaire",parent:"annexes",num:"7.1",title:"Glossaire",kw:"glossaire définitions sigles mcd mld mpd mct mot cif lexique",body:`
<div class="kicker">7.1 — Annexes</div>
<h1>Glossaire</h1>
<table>
<thead><tr><th>Terme</th><th>Définition</th></tr></thead>
<tbody>
<tr><td>Association</td><td>Lien sémantique entre entités, nommé par un verbe, qualifié de cardinalités.</td></tr>
<tr><td>Cardinalité</td><td>Couple (min, max) indiquant combien de fois une occurrence d'entité participe à une association.</td></tr>
<tr><td>CIF</td><td>Contrainte d'Intégrité Fonctionnelle : dépendance un-à-plusieurs ; devient une clé étrangère.</td></tr>
<tr><td>Entité</td><td>Catégorie de choses du réel ayant une existence propre et un identifiant.</td></tr>
<tr><td>Identifiant</td><td>Propriété(s) distinguant de façon unique chaque occurrence ; devient clé primaire.</td></tr>
<tr><td>MCC</td><td>Modèle Conceptuel de la Communication : acteurs et flux d'information.</td></tr>
<tr><td>MCD / MLD / MPD</td><td>Modèles des données : Conceptuel / Logique / Physique.</td></tr>
<tr><td>MCT / MOT / MOpT</td><td>Modèles des traitements : Conceptuel / Organisationnel / Opérationnel.</td></tr>
<tr><td>Occurrence</td><td>Élément particulier d'une entité (une ligne réelle).</td></tr>
<tr><td>Propriété</td><td>Donnée élémentaire et atomique attachée à une entité ou une association.</td></tr>
<tr><td>Normalisation</td><td>Mise en formes normales (1NF→BCNF) pour éliminer les redondances.</td></tr>
<tr><td>Synchronisation</td><td>Condition booléenne déclenchant une opération attendant plusieurs événements.</td></tr>
</tbody>
</table>
`},

/* =========================================================================
   MOTEUR — arbre, routing par hash, fil d'Ariane, recherche, thème
   ========================================================================= */
const byId = Object.fromEntries(NODES.map(n => [n.id, n]));
const childrenOf = id => NODES.filter(n => n.parent === id);
const ROOTS = childrenOf(null);

/* ---- rendu de l'arbre ---- */
function buildTree(){
  const tree = document.getElementById('tree');
  function ul(nodes, lvl){
    const u = document.createElement('ul');
    nodes.forEach(n => {
      const li = document.createElement('li');
      li.className = 'lvl'+lvl;
      const row = document.createElement('div'); row.className='row';
      const kids = childrenOf(n.id);
      const tog = document.createElement('button');
      tog.className = 'tog'+(kids.length? '' : ' leaf');
      tog.textContent = '▶';
      const a = document.createElement('a');
      a.className='item'; a.href='#'+n.id; a.dataset.id=n.id;
      a.innerHTML = (n.num? '<span class="n">'+n.num+'</span>':'') + n.title;
      row.appendChild(tog); row.appendChild(a);
      li.appendChild(row);
      if(kids.length){
        const c = document.createElement('div'); c.className='children';
        c.appendChild(ul(kids, lvl+1));
        li.appendChild(c);
        tog.addEventListener('click', e=>{
          e.preventDefault();
          c.classList.toggle('open');
          tog.classList.toggle('open');
        });
      }
      u.appendChild(li);
    });
    return u;
  }
  tree.appendChild(ul(ROOTS, 1));
}

/* ---- chaîne des ancêtres ---- */
function ancestry(id){
  const chain=[]; let cur=byId[id];
  while(cur){ chain.unshift(cur); cur = cur.parent? byId[cur.parent] : null; }
  return chain;
}

/* ---- rendu d'un nœud ---- */
function renderNode(id){
  const node = byId[id] || byId['home'];
  const art = document.getElementById('article');
  art.innerHTML = node.body;

  /* fil d'Ariane */
  const cr = document.getElementById('crumbs');
  cr.innerHTML='';
  const chain = ancestry(node.id);
  const homeA=document.createElement('a'); homeA.href='#home'; homeA.textContent='MERISE';
  cr.appendChild(homeA);
  chain.forEach((n,i)=>{
    if(n.id==='home') return;
    const sep=document.createElement('span'); sep.className='sep'; sep.textContent='›'; cr.appendChild(sep);
    if(i===chain.length-1){ const s=document.createElement('span'); s.className='cur'; s.textContent=n.title; cr.appendChild(s);}
    else { const a=document.createElement('a'); a.href='#'+n.id; a.textContent=n.title; cr.appendChild(a);}
  });

  /* surlignage + ouverture des ancêtres dans l'arbre */
  document.querySelectorAll('nav.tree a.item').forEach(a=>a.classList.remove('active'));
  const active = document.querySelector('nav.tree a.item[data-id="'+node.id+'"]');
  if(active){
    active.classList.add('active');
    let li = active.closest('li');
    while(li){
      const childrenBox = li.querySelector(':scope > .children');
      const tog = li.querySelector(':scope > .row > .tog');
      const parentBox = li.parentElement.closest('.children');
      if(parentBox){ parentBox.classList.add('open');
        const ptog = parentBox.parentElement.querySelector(':scope > .row > .tog');
        if(ptog) ptog.classList.add('open');
      }
      li = li.parentElement.closest('li');
    }
    active.scrollIntoView({block:'nearest'});
  }

  /* pager prev/next (parcours linéaire en profondeur) */
  buildPager(node.id);

  /* fermer le menu mobile */
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
  window.scrollTo(0,0);
  document.querySelector('.main').scrollTop=0;
}

/* ---- ordre linéaire (DFS) pour prev/next ---- */
function linearOrder(){
  const order=[];
  (function walk(nodes){ nodes.forEach(n=>{ order.push(n.id); walk(childrenOf(n.id)); }); })(ROOTS);
  return order;
}
const LINEAR = linearOrder();
function buildPager(id){
  const i = LINEAR.indexOf(id);
  const prev = i>0? byId[LINEAR[i-1]] : null;
  const next = i<LINEAR.length-1? byId[LINEAR[i+1]] : null;
  const pager = document.createElement('div'); pager.className='pager';
  pager.innerHTML =
    (prev? '<a href="#'+prev.id+'"><div class="lbl">‹ Précédent</div><div class="ttl">'+prev.title+'</div></a>' : '<a class="empty"></a>') +
    (next? '<a class="next" href="#'+next.id+'"><div class="lbl">Suivant ›</div><div class="ttl">'+next.title+'</div></a>' : '<a class="empty"></a>');
  document.getElementById('article').appendChild(pager);
}

/* ---- recherche ---- */
function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return d.textContent||''; }
const SEARCHDATA = NODES.map(n=>({id:n.id,title:n.title,num:n.num,crumb:ancestry(n.id).map(a=>a.title).filter(t=>t!=='Introduction').join(' › '),text:(n.title+' '+(n.kw||'')+' '+stripHtml(n.body)).toLowerCase()}));
function runSearch(q){
  const box=document.getElementById('searchResults');
  q=q.trim().toLowerCase();
  if(!q){ box.innerHTML=''; return; }
  const terms=q.split(/\s+/);
  const hits=SEARCHDATA.filter(d=>terms.every(t=>d.text.includes(t))).slice(0,12);
  if(!hits.length){ box.innerHTML='<li class="no-res">Aucun résultat</li>'; return; }
  box.innerHTML = hits.map(h=>{
    let title=h.title;
    terms.forEach(t=>{ if(t.length>1){ const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); title=title.replace(re,'<mark>$1</mark>'); }});
    return '<li><a href="#'+h.id+'">'+title+(h.crumb? '<span class="crumb">'+h.crumb+'</span>':'')+'</a></li>';
  }).join('');
}

/* ---- thème ---- */
function initTheme(){
  const sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', sys? 'dark':'light');
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark');
}

/* ---- routing : interception des clics (pas de navigation réelle, ni dans
   l'iframe sandboxée de claude.ai, ni en file://) + synchro URL best-effort ---- */
function navigate(id){
  if(!byId[id]) id='home';
  renderNode(id);
  try{ history.pushState({id:id}, '', '#'+id); }catch(e){ /* file:// strict : on ignore */ }
}
function route(){
  const id=(location.hash||'#home').slice(1);
  renderNode(byId[id]? id : 'home');
}
document.addEventListener('click', e=>{
  const a = e.target.closest ? e.target.closest('a[href^="#"]') : null;
  if(a){ e.preventDefault(); navigate(a.getAttribute('href').slice(1)); }
});
window.addEventListener('popstate', route);
document.addEventListener('DOMContentLoaded', ()=>{
  initTheme();
  buildTree();
  route();
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  const search=document.getElementById('search');
  search.addEventListener('input', e=>runSearch(e.target.value));
  document.getElementById('menuBtn').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('scrim').classList.toggle('show');
  });
  document.getElementById('scrim').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('scrim').classList.remove('show');
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='/' && document.activeElement!==search){ e.preventDefault(); search.focus(); }
    if(e.key==='Escape'){ search.value=''; runSearch(''); search.blur(); }
  });
});
</script>
